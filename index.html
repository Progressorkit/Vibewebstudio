<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vibe OS | Pro</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --main-ui: #003366; 
      --glow-ui: #0077ff; 
      --header-red: #ff0000;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
    }

    /* TŁO - TWOJE ZDJĘCIE */
    #bg-image {
      position: fixed; inset: 0;
      background: url('zdjtlo.png') no-repeat center center;
      background-size: cover;
      z-index: 1;
      filter: brightness(0.6); /* Delikatne przyciemnienie, żeby napisy nie znikły */
    }

    /* EFEKT SZKŁA */
    #glass-overlay {
      position: fixed; inset: 0;
      z-index: 2;
      background: rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    header, #center-container, #panel, #statusbar { z-index: 100; position: fixed; }

    #header-console {
      top: 0; left: 0; width: 100%;
      background: rgba(0,0,0,0.8);
      border-bottom: 2px solid var(--main-ui);
      padding: 15px 10px;
    }

    #header-console h1 {
      color: var(--header-red);
      font-size: 20px; text-align: center; letter-spacing: 5px;
      text-shadow: 0 0 10px rgba(255,0,0,0.7);
    }

    .nav-horizontal { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }

    /* MOCNE PULSOWANIE PRZYCISKÓW */
    @keyframes glowPulse {
      0% { box-shadow: 0 0 5px var(--glow-ui); border-color: var(--main-ui); }
      50% { box-shadow: 0 0 20px var(--glow-ui); border-color: var(--glow-ui); }
      100% { box-shadow: 0 0 5px var(--glow-ui); border-color: var(--main-ui); }
    }

    .nav-item {
      padding: 12px 20px; font-size: 12px; font-weight: bold;
      cursor: pointer; border: 1px solid var(--main-ui);
      background: rgba(0, 30, 60, 0.8); color: #fff;
      animation: glowPulse 2s infinite ease-in-out;
    }

    .nav-item.active { 
      background: var(--glow-ui); 
      box-shadow: 0 0 30px var(--glow-ui);
      animation: none; 
      border-color: #fff;
    }

    #center-container {
      left: 50%; top: 55%; transform: translate(-50%, -50%);
      text-align: center;
    }

    .quick-contact {
      display: inline-block; margin-top: 25px; padding: 15px 25px;
      border: 1px solid var(--glow-ui); color: #fff;
      text-decoration: none; font-size: 12px;
      background: rgba(0, 119, 255, 0.2);
    }

    #panel {
      top: -100%; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 500px; height: 50vh;
      background: rgba(0, 5, 15, 0.95);
      border: 2px solid var(--glow-ui);
      padding: 25px; transition: 0.5s ease-in-out;
    }

    #panel.active { top: 180px; }

    #statusbar { 
      bottom: 0; width: 100%; background: #000; 
      padding: 10px; font-size: 10px; display: flex; 
      justify-content: space-between; color: var(--glow-ui);
      border-top: 1px solid var(--main-ui);
    }
  </style>
</head>
<body>

  <div id="bg-image"></div>
  <div id="glass-overlay"></div>

  <header id="header-console">
    <h1>VIBE WEB STUDIO</h1>
    <nav class="nav-horizontal">
      <div class="nav-item" id="btn1" onclick="openMod(1, txt1)">BIO</div>
      <div class="nav-item" id="btn2" onclick="openMod(2, txt2)">TASK</div>
      <div class="nav-item" id="btn3" onclick="openMod(3, txt3)">WORK</div>
    </nav>
  </header>

  <div id="center-container">
    <img src="IMG_20260203_123501.png" alt="Logo" style="width:200px;">
    <br>
    <a href="mailto:progresskit7@gmail.com" class="quick-contact">[ ZAINICJUJ KONTAKT ]</a>
  </div>

  <div id="panel">
    <div id="p-text" style="color:#fff; line-height:1.6; font-size:15px;"></div>
    <div onclick="closeMod()" style="margin-top:30px; color:var(--glow-ui); cursor:pointer; text-align:center;">[ ZAMKNIJ ]</div>
  </div>

  <div id="statusbar">
    <div>SYSTEM_READY</div>
    <div id="sys-time">00:00:00</div>
  </div>

  <script>
    const txt1 = "PROFESJONALIZM BEZ KOMPROMISÓW. Tworzę unikalne strony od zera. Żadnych gotowców.";
    const txt2 = "• Strony Portfolio\n• Systemy Publikacji\n• Custom UI/UX";
    const txt3 = "PROJEKTY:\n- M. Zaworski\n- P. Barczewska";

    function openMod(id, content) {
      document.getElementById('center-container').style.opacity = "0.1";
      const pText = document.getElementById('p-text');
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('btn'+id).classList.add('active');
      pText.innerText = content;
      document.getElementById('panel').classList.add('active');
    }

    function closeMod() {
      document.getElementById('panel').classList.remove('active');
      document.getElementById('center-container').style.opacity = "1";
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    }

    setInterval(() => { 
      document.getElementById('sys-time').innerText = new Date().toLocaleTimeString(); 
    }, 1000);
  </script>
</body>
</html>
