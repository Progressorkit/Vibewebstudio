<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProgressorKit Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
    
    #bg-image { 
      position: fixed; inset: 0; 
      background: url('Zrzut ekranu 2026-04-28 135244.png') no-repeat center center / cover; 
      z-index: 1; 
    }

    #glass-overlay { 
      position: fixed; inset: 0; z-index: 2; 
      background: rgba(0, 8, 20, 0.8); backdrop-filter: blur(20px); 
    }

    #header-console {
      top: 0; left: 0; width: 100%; z-index: 500; position: fixed;
      background: #000; border-bottom: 2px solid #0077ff; padding: 15px; text-align: center;
    }

    .nav-horizontal { display: flex; justify-content: center; gap: 10px; }
    .nav-item { padding: 10px; border: 1px solid #0077ff; cursor: pointer; font-size: 10px; text-transform: uppercase; }
    .nav-item.active { background: #0077ff; color: #000; }

    #panel { z-index: 300; position: fixed; top: 120px; left: 50%; transform: translateX(-50%); width: 90%; height: 75vh; overflow-y: auto; }
    .tile-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
    .tile { background: rgba(0, 20, 40, 0.9); border: 1px solid #0077ff; padding: 20px; }
    
    .case-visual { width: 100%; height: 200px; border: 1px solid #ff0000; margin: 10px 0; overflow: hidden; }
    .case-visual img { width: 100%; height: 100%; object-fit: cover; }
    
    .stat-result { color: #00ff66; border: 1px solid #00ff66; padding: 5px; text-align: center; margin-top: 10px; font-size: 12px; }
  </style>
</head>
<body>

  <div id="bg-image"></div>
  <div id="glass-overlay"></div>

  <header id="header-console">
    <h1 style="color:#ff0000; letter-spacing: 5px; margin-bottom: 10px;">PROGRESSORKIT STUDIO</h1>
    <nav class="nav-horizontal">
      <div class="nav-item active" onclick="loadModule('START')">Start</div>
      <div class="nav-item" onclick="loadModule('PROJEKTY')">Projekty</div>
      <div class="nav-item" onclick="loadModule('KONTAKT')">Kontakt</div>
    </nav>
  </header>

  <div id="panel"><div id="p-content"></div></div>

  <script>
    const modules = {
      START: `
        <div class="tile" style="text-align:center">
          <h2>TERMINUJEMY CHAOS. PROGRAMUJEMY ZYSK.</h2>
          <p>ProgressorKit Studio: Web + .NET / AI.</p>
        </div>
      `,
      PROJEKTY: `
        <div class="tile-grid">
          <div class="tile">
            <div class="tile-header">PROJEKT: RWR</div>
            <div class="case-visual">
              <img src="Zrzut ekranu 2026-04-28 135253.jpg">
            </div>
            <p>System logistyczny RWR.</p>
            <div class="stat-result">AUTOMATYZACJA</div>
          </div>

          <div class="tile">
            <div class="tile-header">PROJEKT: APKA</div>
            <div class="case-visual">
              <img src="Zrzut ekranu 2026-04-28 135301.jpg">
            </div>
            <p>Glikemia Premium.</p>
            <div class="stat-result">DESIGN UI</div>
          </div>

          <div class="tile">
            <div class="tile-header">PROJEKT: ZAWORSKI</div>
            <div class="case-visual">
              <img src="Zrzut ekranu 2026-04-28 135311.jpg">
            </div>
            <p>Marek Zaworski - Strona Autora.</p>
            <div class="stat-result">BRANDING</div>
          </div>

          <div class="tile">
            <div class="tile-header">PROJEKT: BARCZEWSKA</div>
            <p style="margin-top:20px;">P.A. Barczewska - Marka osobista i automatyzacja leadów.</p>
            <div class="stat-result">OPIS PROJEKTU</div>
          </div>
        </div>
      `,
      KONTAKT: `<div class="tile"><h2>KONTAKT</h2><p>progressorkit@gmail.com</p></div>`
    };

    function loadModule(key) {
      document.getElementById('p-content').innerHTML = modules[key];
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    }
    window.onload = () => loadModule('START');
  </script>
</body>
</html>
