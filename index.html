<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vibe OS | Pro</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
      color: #ff0000;
    }

    /* TŁO I SIATKA */
    body::before {
      content: ""; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(255, 0, 0, 0.08) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 2; pointer-events: none;
    }

    #bg-layer {
      position: fixed; inset: 0; z-index: 1;
      background-size: cover; background-position: center;
      background-image: url('./bg1.jpg');
      filter: brightness(0.25) contrast(1.2);
      transition: 1s ease;
    }

    /* NAGŁÓWEK I NAWIGACJA */
    #header-console {
      position: fixed; top: 0; left: 0; width: 100%;
      z-index: 2000; background: rgba(0,0,0,0.9);
      border-bottom: 2px solid #ff0000;
      padding: 15px 10px;
    }

    #header-console h1 {
      font-size: 18px; text-align: center; letter-spacing: 5px;
      margin-bottom: 10px; text-shadow: 0 0 10px #ff0000;
    }

    .nav-instruction {
      font-size: 10px; text-align: center; color: #fff;
      letter-spacing: 1px; margin-bottom: 15px;
      text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1);
      padding: 5px; background: rgba(255,255,255,0.05);
    }

    .nav-horizontal {
      display: flex; justify-content: space-between;
      gap: 8px; max-width: 600px; margin: 0 auto;
    }

    .nav-item {
      flex: 1; text-align: center;
      padding: 12px 5px; font-size: 11px; font-weight: bold;
      cursor: pointer; border: 1px solid #ff0000;
      transition: 0.3s; background: rgba(0, 0, 0, 0.6);
    }

    .nav-item.active { 
      background: #ff0000;
      color: #000;
      box-shadow: 0 0 15px #ff0000;
    }

    /* LOGO CENTRALNE - PRZYWRÓCONE KOLORY */
    #center-logo {
      position: fixed; left: 50%; top: 55%;
      transform: translate(-50%, -50%);
      z-index: 5; opacity: 0.8; pointer-events: none;
      transition: 0.5s;
    }
    #center-logo img { width: 280px; }
    body.panel-open #center-logo { opacity: 0.1; filter: blur(3px); }

    /* PANEL TREŚCI */
    #panel {
      position: fixed; top: -100%; left: 50%;
      transform: translateX(-50%);
      width: 95%; max-width: 650px;
      height: 70vh;
      background: rgba(0, 0, 0, 0.98);
      border: 1px solid #ff0000;
      padding: 25px; z-index: 1500;
      transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
      display: flex; flex-direction: column;
    }

    #panel.active { top: 145px; }

    #p-title {
      font-size: 18px; color: #ff0000;
      border-bottom: 1px solid #ff0000;
      padding-bottom: 10px; font-weight: bold;
    }

    #p-text {
      flex-grow: 1; overflow-y: auto;
      font-size: 16px; /* DUŻY CZYTELNY TEKST */
      line-height: 1.7;
      color: #ffffff; margin-top: 20px;
    }

    /* KARTY PORTFOLIO */
    .portfolio-item {
      border: 1px solid #ff0000;
      padding: 15px; margin-bottom: 20px;
      background: rgba(255, 0, 0, 0.05);
    }
    .portfolio-link {
      display: inline-block; margin-top: 10px;
      color: #000; background: #ff0000;
      padding: 8px 15px; text-decoration: none;
      font-weight: bold; font-size: 12px;
    }

    .close-area {
      margin-top: 20px; padding: 15px;
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid #ff0000;
      text-align: center; font-size: 12px;
      cursor: pointer; color: #ff0000;
    }

    #statusbar { 
      position: fixed; bottom: 0; width: 100%; 
      background: #000; border-top: 1px solid #ff0000;
      padding: 10px 15px; font-size: 11px; z-index: 2100;
      display: flex; justify-content: space-between;
    }
  </style>
</head>
<body>

  <div id="bg-layer"></div>

  <header id="header-console">
    <h1>VIBE WEB STUDIO</h1>
    <div class="nav-instruction">KLIKNIJ KAFELEK PONIŻEJ, ABY WYŚWIETLIĆ DANE</div>
    <nav class="nav-horizontal">
      <div class="nav-item" id="btn1" onclick="openMod(1, './bg1.jpg', 'IDENTYFIKACJA', txt1, false)">BIO</div>
      <div class="nav-item" id="btn2" onclick="openMod(2, './bg2.jpg', 'OFERTA', txt2, false)">TASK</div>
      <div class="nav-item" id="btn3" onclick="openMod(3, './bg3.jpg', 'PROJEKTY', txt3, true)">WORK</div>
      <div class="nav-item" id="btn4" onclick="openMod(4, './bg4.jpg', 'KONTAKT', txt4, false)">LINK</div>
    </nav>
  </header>

  <div id="center-logo">
    <img src="./IMG_20260203_123501.png" alt="Logo">
  </div>

  <div id="panel">
    <div id="p-title"></div>
    <div id="p-text"></div>
    <div class="close-area" onclick="closeMod()">[ ZAMKNIJ MODUŁ ]</div>
  </div>

  <div id="statusbar">
    <div id="sys-log">SYSTEM_ACTIVE</div>
    <div id="sys-time">00:00:00</div>
  </div>

  <script>
    let timer = null;

    const txt1 = `Specjalizuję się w budowie nowoczesnych interfejsów i systemów zarządzania treścią.\n\nMoje podejście:\n• Czysty i szybki kod\n• Brutalistyczny design\n• Pełna responsywność\n• Optymalizacja pod konwersję`;
    const txt2 = `Dostarczam rozwiązania skrojone pod Twój biznes:\n\n• Profesjonalne Portfolio\n• Landing Pages sprzedażowe\n• Blogi i Systemy Publikacji\n• Pełne wdrożenie na serwer`;
    
    const txt3 = `
      <div class="portfolio-item">
        <strong>MAREK ZAWORSKI</strong><br>
        <small>System publikacji / Narracja</small><br>
        <a href="https://progressorkit.github.io/marekzaworski.github.io/" target="_blank" class="portfolio-link">URUCHOM PROJEKT</a>
      </div>
      <div class="portfolio-item">
        <strong>PAULINA BARCZEWSKA</strong><br>
        <small>Portfolio autorskie</small><br>
        <a href="https://pbarczewska.github.io/" target="_blank" class="portfolio-link">URUCHOM PROJEKT</a>
      </div>`;
      
    const txt4 = `Napisz do mnie, aby omówić projekt:\n\nEMAIL: progresskit7@gmail.com\n\nStatus: Gotowy do współpracy.`;

    function openMod(id, img, title, content, isHtml) {
      document.getElementById('bg-layer').style.backgroundImage = `url('${img}')`;
      document.body.classList.add('panel-open');
      document.getElementById('p-title').innerText = "> " + title;
      const pText = document.getElementById('p-text');
      
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('btn'+id).classList.add('active');

      if (timer) clearInterval(timer);

      if (isHtml) { 
        // Dla portfolio (WORK) nie używamy animacji pisania, by linki działały
        pText.innerHTML = content; 
      } else {
        pText.innerHTML = "";
        let i = 0;
        timer = setInterval(() => {
          if (i < content.length) { pText.innerHTML += content[i++]; }
          else { clearInterval(timer); }
        }, 10);
      }
      document.getElementById('panel').classList.add('active');
      document.getElementById('sys-log').innerText = `DATA_STREAM_0${id}_LIVE`;
    }

    function closeMod() {
      if (timer) clearInterval(timer);
      document.getElementById('panel').classList.remove('active');
      document.body.classList.remove('panel-open');
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('sys-log').innerText = "SYSTEM_ACTIVE";
    }

    setInterval(() => {
      document.getElementById('sys-time').innerText = new Date().toLocaleTimeString();
    }, 1000);
  </script>
</body>
</html>
