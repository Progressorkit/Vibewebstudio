<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vibe OS | Pro</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --main-ui: #003366; 
      --glow-ui: #0077ff; 
      --header-red: #ff0000;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
    }

    /* TŁO - TERAZ WIDOCZNE */
    #bg-image {
      position: fixed; inset: 0;
      background: url('./File_000000007f9c720ab829b9d20e358f6d.png') no-repeat center center;
      background-size: cover;
      z-index: 1;
      filter: saturate(0.6) brightness(0.5); /* Większa jasność niż poprzednio */
    }

    /* SZKŁO - MNIEJSZE ROZMYCIE */
    #glass-overlay {
      position: fixed; inset: 0;
      z-index: 2;
      background: rgba(0, 5, 15, 0.4); /* Bardziej przezroczyste */
      backdrop-filter: blur(5px); /* Lżejszy blur, żeby było widać co jest w tle */
      -webkit-backdrop-filter: blur(5px);
    }

    #grid-layer {
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0, 119, 255, 0.08) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 119, 255, 0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 3; pointer-events: none;
    }

    header, #center-container, #panel, #statusbar { z-index: 100; position: fixed; }

    #header-console {
      top: 0; left: 0; width: 100%;
      background: rgba(0,0,0,0.8);
      border-bottom: 2px solid var(--main-ui);
      padding: 15px 10px;
    }

    #header-console h1 {
      color: var(--header-red);
      font-size: 19px; text-align: center; letter-spacing: 5px;
      text-shadow: 0 0 10px rgba(255,0,0,0.7);
    }

    .nav-horizontal { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }

    /* ANIMACJA PULSOWANIA */
    @keyframes glowPulse {
      0% { box-shadow: 0 0 2px var(--glow-ui); border-color: var(--main-ui); }
      50% { box-shadow: 0 0 15px var(--glow-ui); border-color: var(--glow-ui); }
      100% { box-shadow: 0 0 2px var(--glow-ui); border-color: var(--main-ui); }
    }

    .nav-item {
      padding: 12px 18px; font-size: 11px; font-weight: bold;
      cursor: pointer; border: 1px solid var(--main-ui);
      background: rgba(0, 30, 60, 0.6); color: #fff;
      animation: glowPulse 2.5s infinite ease-in-out; /* Pulsowanie na start */
    }

    .nav-item.active { 
      background: var(--glow-ui); 
      box-shadow: 0 0 30px var(--glow-ui);
      animation: none; /* Po kliknięciu świeci stałym, mocnym światłem */
    }

    #center-container {
      left: 50%; top: 55%; transform: translate(-50%, -50%);
      text-align: center;
    }

    .quick-contact {
      display: inline-block; margin-top: 25px; padding: 15px 25px;
      border: 1px solid var(--glow-ui); color: #fff;
      text-decoration: none; font-size: 12px; letter-spacing: 2px;
      background: rgba(0, 119, 255, 0.2);
      box-shadow: 0 0 10px var(--main-ui);
    }

    #panel {
      top: -100%; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 500px; height: 55vh;
      background: rgba(0, 5, 15, 0.95);
      border: 2px solid var(--glow-ui);
      padding: 25px; transition: 0.5s;
    }

    #panel.active { top: 180px; }

    #statusbar { 
      bottom: 0; width: 100%; background: #000; 
      padding: 10px; font-size: 10px; display: flex; 
      justify-content: space-between; color: var(--glow-ui);
      border-top: 1px solid var(--main-ui);
    }
  </style>
</head>
<body>

  <div id="bg-image"></div>
  <div id="glass-overlay"></div>
  <div id="grid-layer"></div>

  <header id="header-console">
    <h1>VIBE WEB STUDIO</h1>
    <nav class="nav-horizontal">
      <div class="nav-item" id="btn1" onclick="openMod(1, txt1, false)">BIO</div>
      <div class="nav-item" id="btn2" onclick="openMod(2, txt2, false)">TASK</div>
      <div class="nav-item" id="btn3" onclick="openMod(3, txt3, true)">WORK</div>
    </nav>
  </header>

  <div id="center-container">
    <img src="./IMG_20260203_123501.png" alt="Logo" style="width:220px;">
    <br>
    <a href="mailto:progresskit7@gmail.com" class="quick-contact">[ ZAINICJUJ KONTAKT ]</a>
  </div>

  <div id="panel">
    <div id="p-text" style="color:#fff; line-height:1.6;"></div>
    <div onclick="closeMod()" style="margin-top:30px; color:var(--glow-ui); cursor:pointer; text-align:center;">[ ZAMKNIJ ]</div>
  </div>

  <div id="statusbar">
    <div>SYSTEM_ONLINE</div>
    <div id="sys-time">00:00:00</div>
  </div>

  <script>
    const txt1 = "Buduję ekosystemy cyfrowe od zera. Bez gotowców, bez szablonów. Tylko surowy kod i unikalny design.";
    const txt2 = "• Strony Portfolio\n• Systemy Publikacji\n• Dedykowane UI/UX";
    const txt3 = "<strong>PROJEKTY:</strong><br><br>M. ZAWORSKI<br>P. BARCZEWSKA";

    function openMod(id, content, isHtml) {
      document.getElementById('center-container').style.opacity = "0.1";
      const pText = document.getElementById('p-text');
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('btn'+id).classList.add('active');
      pText.innerHTML = isHtml ? content : content;
      document.getElementById('panel').classList.add('active');
    }

    function closeMod() {
      document.getElementById('panel').classList.remove('active');
      document.getElementById('center-container').style.opacity = "1";
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    }

    setInterval(() => { document.getElementById('sys-time').innerText = new Date().toLocaleTimeString(); }, 1000);
  </script>
</body>
</html>
