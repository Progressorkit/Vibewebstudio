<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProgressorKit Studio</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family: monospace;
}

#panel {
  padding:20px;
}

.tile {
  margin-bottom:40px;
}

img {
  width:100%;
}

button {
  margin:5px;
  padding:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="panel">
  <div id="p-content"></div>
</div>

<script>

let sliders = {
  zaworski: 0,
  barczewska: 0,
  rwr: 0,
  apka: 0
};

function nextSlide(id, total) {
  sliders[id] = (sliders[id] + 1) % total;
  updateSlide(id);
}

function prevSlide(id, total) {
  sliders[id] = (sliders[id] - 1 + total) % total;
  updateSlide(id);
}

function updateSlide(id) {
  const slides = document.querySelectorAll("#"+id+" img");
  slides.forEach((img, i) => {
    img.style.display = (i === sliders[id]) ? "block" : "none";
  });
}

const modules = {

HERO: `
<div class="tile">
<h2>STRONY I SYSTEMY, KTÓRE ZWIĘKSZAJĄ SPRZEDAŻ</h2>
<p>Projektujemy systemy dla firm, strony immersyjne oraz rozwiązania .NET / AI nastawione na zysk.</p>
</div>
`,

DOWODY: `
<div class="tile">

<h3>Marek Zaworski</h3>
<div id="zaworski">
<img src="zaworski1.png">
<img src="zaworski2.png" style="display:none">
<img src="zaworski3.png" style="display:none">
<img src="zaworski4.png" style="display:none">
<img src="zaworski5.png" style="display:none">
<img src="zaworski6.png" style="display:none">
</div>
<button onclick="prevSlide('zaworski',6)">←</button>
<button onclick="nextSlide('zaworski',6)">→</button>

<h3>P.A. Barczewska</h3>
<div id="barczewska">
<img src="zaworski1.png">
<img src="zaworski2.png" style="display:none">
</div>
<button onclick="prevSlide('barczewska',2)">←</button>
<button onclick="nextSlide('barczewska',2)">→</button>

<h3>RWR SYSTEM</h3>
<div id="rwr">
<img src="rwr0.png">
<img src="rwr1.png" style="display:none">
<img src="rwr2.png" style="display:none">
<img src="rwr3.png" style="display:none">
<img src="rwr4.png" style="display:none">
<img src="rwr5.png" style="display:none">
</div>
<button onclick="prevSlide('rwr',6)">←</button>
<button onclick="nextSlide('rwr',6)">→</button>

<h3>Glikemia Premium</h3>
<div id="apka">
<img src="apka1.jpg">
<img src="apka2.jpg" style="display:none">
<img src="apka3.jpg" style="display:none">
<img src="apka4.jpg" style="display:none">
<img src="apka6.jpg" style="display:none">
<img src="apkapdf.jpg" style="display:none">
</div>
<button onclick="prevSlide('apka',6)">←</button>
<button onclick="nextSlide('apka',6)">→</button>

</div>
`,

KONTAKT: `
<div class="tile">
<h2>MASZ PROJEKT? WYŚLIJ BRIEF</h2>
<p>progressorkit@gmail.com</p>
</div>
`

};

function loadModule(key) {
  document.getElementById("p-content").innerHTML = modules[key];
}

// 🔥 START OD RAZU (to chciałeś)
window.onload = () => {
  loadModule("HERO");
};

</script>

</body>
</html>
