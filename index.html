<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ARCHITEKT ZYSKU | VIBE WEB STUDIO</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ui-blue: #0077ff;
      --ui-blue-glow: #00aaff;
      --ui-red: #ff0000;
      --ui-red-glow: #ff4444;
      --glass: rgba(0, 5, 15, 0.95);
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #000; font-family: 'Courier New', monospace; color: #fff;
    }

    #bg-image { 
      position: fixed; inset: 0; 
      background: url('zdjtlo.png') no-repeat center center; 
      background-size: cover; z-index: 1; pointer-events: none; 
    }

    #glass-overlay { 
      position: fixed; inset: 0; z-index: 2; 
      background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.9) 100%), rgba(0, 8, 20, 0.7);
      backdrop-filter: blur(20px) brightness(0.5);
      -webkit-backdrop-filter: blur(20px) brightness(0.5);
    }

    #header-console {
      top: 0; left: 0; width: 100%; z-index: 500; position: fixed;
      background: rgba(0,0,0,0.98); border-bottom: 2px solid var(--ui-blue);
      padding: 15px; text-align: center;
    }

    #header-console h1 {
      color: var(--ui-red); font-size: 14px; letter-spacing: 5px; font-weight: 900;
      text-shadow: 0 0 10px var(--ui-red); margin-bottom: 10px;
    }

    .nav-horizontal { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    
    .nav-item {
      padding: 8px 16px; font-size: 10px; font-weight: 900; cursor: pointer;
      border: 1px solid var(--ui-blue); color: #fff; transition: 0.3s;
      background: rgba(0, 119, 255, 0.1); text-transform: uppercase;
    }

    .nav-item:hover, .nav-item.active { background: var(--ui-blue); color: #000; box-shadow: 0 0 15px var(--ui-blue-glow); }
    .nav-item.important { border-color: var(--ui-red); color: var(--ui-red-glow); }

    #panel {
      z-index: 300; position: fixed; top: 125px; left: 50%;
      transform: translateX(-50%); width: 95%; max-width: 1300px;
      height: calc(100vh - 180px); overflow-y: auto;
      padding-bottom: 50px; scroll-behavior: smooth;
    }

    .tile-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; margin-bottom: 40px; }
    
    .tile {
      background: rgba(0, 15, 30, 0.8); backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 119, 255, 0.2); padding: 30px;
      animation: fadeIn 0.5s ease forwards; opacity: 0;
    }

    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

    .tile-header { 
      color: var(--ui-blue-glow); font-size: 11px; font-weight: bold; 
      margin-bottom: 15px; border-left: 4px solid var(--ui-red); padding-left: 12px;
      text-transform: uppercase; letter-spacing: 2px;
    }

    .tile h2 { font-size: 24px; margin-bottom: 12px; color: #fff; letter-spacing: -1px; }
    .tile p { font-size: 14px; line-height: 1.6; color: #bbb; margin-bottom: 15px; }

    .cta-button { 
      display: inline-block; padding: 14px 28px; background: var(--ui-red); color: #fff; 
      text-decoration: none; font-weight: 900; font-size: 12px; letter-spacing: 2px;
      border: none; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin: 5px;
    }
    .cta-button.alt { background: transparent; border: 1px solid #fff; }
    .cta-button:hover { background: #fff; color: #000; box-shadow: 0 0 25px #fff; }

    .stat-box { background: rgba(0, 255, 100, 0.05); border: 1px solid #00ff66; padding: 12px; margin-top: 15px; color: #00ff66; font-weight: 900; font-size: 12px; text-align: center; }

    #statusbar {
      z-index: 500; position: fixed; bottom: 0; width: 100%;
      background: #000; padding: 10px 25px; font-size: 10px;
      display: flex; justify-content: space-between; color: var(--ui-blue); border-top: 1px solid var(--ui-blue);
    }
  </style>
</head>
<body>

  <div id="bg-image"></div>
  <div id="glass-overlay"></div>

  <header id="header-console">
    <h1>ARCHITEKT ZYSKU // SYSTEMY & SPRZEDAŻ</h1>
    <nav class="nav-horizontal">
      <div class="nav-item active" onclick="loadModule('START')">Start</div>
      <div class="nav-item" onclick="loadModule('ROZWIAZANIA')">Rozwiązania</div>
      <div class="nav-item" onclick="loadModule('PROJEKTY')">Projekty</div>
      <div class="nav-item" onclick="loadModule('OFERTA')">Oferta</div>
      <div class="nav-item" onclick="loadModule('DLACZEGO')">Dlaczego ja?</div>
      <div class="nav-item important" onclick="loadModule('KONTAKT')">Brief / Rozmowa</div>
    </nav>
  </header>

  <div id="panel">
    <div id="p-content"></div>
  </div>

  <div id="statusbar">
    <div>ROLE: BUSINESS_PROBLEM_SOLVER // SYSTEM: .NET_AI_WEB // VERSION: 9.0</div>
    <div id="sys-time">00:00:00</div>
  </div>

  <script>
    const modules = {
      START: `
        <div class="tile" style="grid-column: 1 / -1; text-align: center;">
          <div class="tile-header">MANIFEST</div>
          <h2 style="font-size: 42px; line-height: 1.1; margin-bottom: 20px;">Terminujemy chaos. <br><span style="color:var(--ui-red);">Programujemy zysk.</span></h2>
          <p style="font-size: 18px; max-width: 850px; margin: 0 auto 25px auto;">Tworzę strony i systemy, które <strong>zwiększają sprzedaż</strong> i automatyzują Twój biznes. Skupiam się na wyniku finansowym, nie na „ładnych obrazkach”.</p>
          <div>
            <button class="cta-button" onclick="loadModule('PROJEKTY')">ZOBACZ PROJEKTY</button>
            <button class="cta-button alt" onclick="loadModule('KONTAKT')">UMÓW ROZMOWĘ 15 MIN</button>
          </div>
        </div>
      `,

      ROZWIAZANIA: `
        <div class="tile-grid">
          <div class="tile">
            <div class="tile-header">IDENTYFIKACJA PROBLEMÓW</div>
            <p>• <strong>Niewidoczność:</strong> Twoja strona nie buduje zaufania w 5 sekund – tracisz klienta.<br>• <strong>Nieefektywność:</strong> Marnujesz 2h dziennie na ręczne procesy, które powinno robić AI.<br>• <strong>Brak Skalowania:</strong> Twoje obecne narzędzia blokują Twój wzrost.</p>
          </div>
          <div class="tile">
            <div class="tile-header">MOJE NARZĘDZIA ZYSKU</div>
            <p>• <strong>Brand Web:</strong> Strony marek osobistych nastawione na autorytet i sprzedaż.<br>• <strong>Custom ERP/CRM:</strong> Systemy (jak RWR) eliminujące błędy operacyjne.<br>• <strong>High-End Mobile:</strong> Aplikacje użytkowe budujące realną wartość produktu.</p>
          </div>
        </div>
      `,

      PROJEKTY: `
        <div class="tile-grid">
          <div class="tile">
            <div class="tile-header">SYSTEM: RWR LOGISTYKA</div>
            <h2>LOGISTICS CORE ENGINE</h2>
            <p><strong>CEL:</strong> Eliminacja chaosu w zlecenich i błędów w fakturowaniu.</p>
            <p><strong>EFEKT:</strong> Automatyczny obieg dokumentów i oszczędność 40% czasu operacyjnego.</p>
            <div class="stat-box">ZYSK: PEŁNA KONTROLA OPERACYJNA</div>
          </div>

          <div class="tile">
            <div class="tile-header">BRAND: MAREK ZAWORSKI</div>
            <h2>OBSERWATOR - STRONA AUTORA</h2>
            <p><strong>CEL:</strong> Budowa mrocznego klimatu i konwersja czytelnika na subskrybenta.</p>
            <p><strong>EFEKT:</strong> Unikalny design budujący autorytet literacki i sprzedaż książek.</p>
            <div class="stat-box">WIZERUNEK: KLASA PREMIUM</div>
          </div>

          <div class="tile">
            <div class="tile-header">APP: GLIKEMIA PREMIUM</div>
            <h2>HEALTH-TECH NATIVE APP</h2>
            <p><strong>CEL:</strong> Stworzenie narzędzia do precyzyjnego monitorowania zdrowia.</p>
            <p><strong>EFEKT:</strong> Interfejs klasy premium zintegrowany z analityką danych w czasie rzeczywistym.</p>
            <div class="stat-box">PRODUCT: TOP-TIER UX</div>
          </div>

          <div class="tile">
            <div class="tile-header">BRAND: P.A. BARCZEWSKA</div>
            <h2>PROFESSIONAL PERSONAL BRAND</h2>
            <p><strong>CEL:</strong> Stworzenie wizerunku eksperta budującego zaufanie w 5 sekund.</p>
            <p><strong>EFEKT:</strong> Systemowa wizytówka automatyzująca proces pozyskiwania leadów.</p>
            <div class="stat-box">KONWERSJA: +100% ZAUFANIA</div>
          </div>
        </div>
      `,

      OFERTA: `
        <div class="tile-grid">
          <div class="tile">
            <div class="tile-header">01 // START</div>
            <h2>BRAND WEB</h2>
            <p>Dla autorów i ekspertów. Strona, która sprzedaje Twój autorytet. Zero szablonów.</p>
            <span class="price-tag">OD 800 €</span>
          </div>
          <div class="tile" style="border: 1px solid var(--ui-red);">
            <div class="tile-header">02 // GROWTH</div>
            <h2>SALES SYSTEM</h2>
            <p>Lejki sprzedażowe i landingi zoptymalizowane pod twardy wynik finansowy.</p>
            <span class="price-tag">1500 – 3000 €</span>
          </div>
          <div class="tile">
            <div class="tile-header">03 // SYSTEM</div>
            <h2>CUSTOM .NET / AI</h2>
            <p>Pełna automatyzacja (jak RWR). Systemy dedykowane, które pracują na Twój zysk 24/7.</p>
            <span class="price-tag">OD 3000 €</span>
          </div>
        </div>
      `,

      DLACZEGO: `
        <div class="tile-grid">
          <div class="tile">
            <div class="tile-header">DLACZEGO JA?</div>
            <p>• <strong>Brak Szablonów:</strong> Twoja firma nie może wyglądać jak kopia kopii.<br>• <strong>Własność Kodu:</strong> Nie wynajmujesz u mnie strony. Jesteś jej właścicielem.<br>• <strong>Podejście Inżynierskie:</strong> Buduję rozwiązania w .NET, które są bezpieczne i skalowalne.</p>
          </div>
          <div class="tile">
            <div class="tile-header">PROCES EGZEKUCJI</div>
            <p>1. Analiza biznesowa (Gdzie ucieka kasa?)<br>2. Architektura rozwiązania (Design + Logic)<br>3. Development i Testy (Kodowanie wyniku)<br>4. Deployment i Skalowanie.</p>
          </div>
        </div>
      `,

      KONTAKT: `
        <div class="tile" style="grid-column: 1 / -1; text-align: center;">
          <div class="tile-header">BRIEF / ROZMOWA</div>
          <h2>PRZEJDŹMY DO KONKRETÓW</h2>
          <p>Wybierz opcję, która najbardziej szanuje Twój czas.</p>
          <div style="margin-top: 30px;">
            <a href="mailto:progressorkit@gmail.com" class="cta-button">WYŚLIJ BRIEF PROJEKTOWY</a>
            <button class="cta-button alt">UMÓW ROZMOWĘ 15 MIN</button>
          </div>
          <p style="margin-top: 20px; font-size: 11px; color: var(--ui-blue-glow);">progressorkit@gmail.com // GITHUB: /progressorkit</p>
        </div>
      `
    };

    function loadModule(key) {
      const content = document.getElementById('p-content');
      content.innerHTML = modules[key];
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
        if(item.innerText.toUpperCase().includes(key)) item.classList.add('active');
      });
      document.getElementById('panel').scrollTop = 0;
    }

    window.onload = () => {
      loadModule('START');
      setInterval(() => { 
        document.getElementById('sys-time').innerText = new Date().toLocaleTimeString(); 
      }, 1000);
    };
  </script>
</body>
</html>
