<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vibe OS | Red Alert</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0000;
      font-family: monospace;
      color: #ff0000;
    }

    /* TŁO */
    #bg-layer {
      position: fixed; inset: 0; z-index: 1;
      background-size: cover; background-position: center;
      background-image: url('./bg1.jpg');
      filter: brightness(0.5) contrast(1.2);
      transition: background-image 0.5s ease-in-out;
    }

    #bg-overlay {
      position: fixed; inset: 0; z-index: 2;
      background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.9) 100%);
      pointer-events: none;
    }

    /* NOWY ELEMENT: NAGŁÓWEK NA GÓRZE */
    #top-header {
      position: fixed;
      top: 0; left: 0; width: 100%;
      padding: 20px;
      z-index: 100;
      text-align: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      pointer-events: none;
    }

    #top-header h1 {
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 5px;
      text-shadow: 0 0 10px #ff0000;
    }

    #top-header p {
      font-size: 10px;
      color: rgba(255, 0, 0, 0.7);
      letter-spacing: 1px;
    }

    /* NAWIGACJA */
    .nav-container {
      position: fixed; right: 20px; top: 50%;
      transform: translateY(-50%);
      z-index: 2000; 
      display: flex; flex-direction: column; gap: 15px;
    }

    .btn {
      width: 55px; height: 55px;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid #ff0000;
      color: #ff0000;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 20px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
      transition: 0.3s;
    }

    .btn.active { background: #ff0000; color: #000; box-shadow: 0 0 20px #ff0000; }

    /* PANEL BOCZNY */
    #panel {
      position: fixed; left: -110%; top: 5%;
      width: min(90%, 380px); height: 90vh;
      background: rgba(10, 0, 0, 0.98);
      border: 1px solid #ff0000;
      padding: 20px; z-index: 1500;
      transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column;
      box-shadow: 0 0 30px rgba(0,0,0,1);
    }

    #panel.active { left: 10px; }

    #p-text {
      flex-grow: 1; overflow-y: auto;
      font-size: 14px; line-height: 1.6;
      color: #fff; margin: 15px 0;
      word-break: break-all;
    }

    .close-btn {
      padding: 12px; border: 1px solid #ff0000;
      color: #ff0000; text-align: center;
      cursor: pointer; font-size: 11px;
    }

    #center-logo {
      position: fixed; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      z-index: 5; text-align: center; pointer-events: none;
    }
    #center-logo img { width: min(60vw, 260px); opacity: 0.9; filter: drop-shadow(0 0 10px #ff000055); }

    /* PROJEKTY */
    .preview-card { border: 1px solid #ff000055; padding: 10px; margin-bottom: 15px; background: rgba(255,0,0,0.05); }
    .preview-frame { height: 120px; overflow: hidden; position: relative; margin: 10px 0; border: 1px solid #333; }
    .preview-frame iframe { width: 1000px; height: 700px; transform: scale(0.28); transform-origin: 0 0; border: none; pointer-events: none; }
    
    #statusbar { position: fixed; bottom: 0; width: 100%; background: #000; color: #ff0000; padding: 8px; font-size: 10px; z-index: 2100; border-top: 1px solid #330000; }
  </style>
</head>
<body>

  <header id="top-header">
    <h1>VIBE WEB STUDIO</h1>
    <p>DESIGN & CODE TERMINAL // SELEKTYWNE WDROŻENIA</p>
  </header>

  <div id="bg-layer"></div>
  <div id="bg-overlay"></div>

  <div id="center-logo">
    <img src="./IMG_20260203_123501.png" alt="Logo">
    <div id="core-text" style="font-size: 10px; margin-top: 10px; opacity: 0.5;">&lt;system init="vibe_os" status="active" /&gt;</div>
  </div>

  <div class="nav-container">
    <div class="btn" id="btn1" onclick="openMod(1, './bg1.jpg', 'KIM_JESTEM', txt1, false)">01</div>
    <div class="btn" id="btn2" onclick="openMod(2, './bg2.jpg', 'CO_ROBIĘ', txt2, false)">02</div>
    <div class="btn" id="btn3" onclick="openMod(3, './bg3.jpg', 'PROJEKTY', txt3, true)">03</div>
    <div class="btn" id="btn4" onclick="openMod(4, './bg4.jpg', 'KONTAKT', txt4, false)">04</div>
  </div>

  <div id="panel">
    <div id="p-title" style="font-size: 20px; border-bottom: 1px solid #ff0000; padding-bottom: 5px; text-transform: uppercase;"></div>
    <div id="p-text"></div>
    <div class="close-btn" onclick="closeMod()">ZAMKNIJ_SYSTEM</div>
  </div>

  <div id="statusbar">MODE: RED_OS | ENCRYPTED CONNECTION | STANDBY</div>

  <script>
    let timer = null;

    const txt1 = `[PROFILE] Kim jestem\nProjektuję i buduję strony oraz systemy treści, które działają stabilnie – nie tylko wyglądają.\n\nŁączę estetykę z logiką:\n• czytelność i struktura\n• spójny klimat\n• modułowa budowa\n• gotowe wdrożenie\n\nTen interfejs to demonstracja sposobu myślenia.`;
    const txt2 = `[OFFER] Co mogę zrobić\n• strony portfolio i autorskie\n• strony usługowe pod sprzedaż\n• systemy tekstów i publikacji\n• wdrożenia GitHub / Netlify\n\nProjekt ma być szybki, czytelny i gotowy do użycia – nie makieta.`;
    const txt3 = `<div>[PROOFS] Projekty</div>
      <div class="previews">
        <div class="preview-card">
          <strong>MAREK ZAWORSKI</strong><br><small>narracja / noir / system publikacji</small>
          <div class="preview-frame"><iframe src="https://progressorkit.github.io/marekzaworski.github.io/"></iframe></div>
          <a href="https://progressorkit.github.io/marekzaworski.github.io/" target="_blank" style="color:#ff0000; text-decoration:none; font-size:12px; border:1px solid #ff0000; padding:4px 8px; display:inline-block; margin-top:5px;">Otwórz pełną</a>
        </div>
        <div class="preview-card">
          <strong>PAULINA</strong><br><small>pisarka, autorka powieści</small>
          <div class="preview-frame"><iframe src="https://pbarczewska.github.io/"></iframe></div>
          <a href="https://pbarczewska.github.io/" target="_blank" style="color:#ff0000; text-decoration:none; font-size:12px; border:1px solid #ff0000; padding:4px 8px; display:inline-block; margin-top:5px;">Otwórz pełną</a>
        </div>
      </div>`;
    const txt4 = `[CONTACT] Kontakt\n\nNajprościej: email.\n\nprogresskit7@gmail.com\n\nUstalamy cel → robię wdrożenie.`;

    function openMod(id, img, title, content, isHtml) {
      document.getElementById('bg-layer').style.backgroundImage = `url('${img}')`;
      document.getElementById('p-title').innerText = "> " + title;
      const pText = document.getElementById('p-text');
      
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn'+id).classList.add('active');

      if (timer) clearInterval(timer);
      if (isHtml) {
        pText.innerHTML = content;
      } else {
        pText.textContent = "";
        let i = 0;
        timer = setInterval(() => {
          if (i < content.length) { pText.textContent += content[i++]; }
          else { clearInterval(timer); }
        }, 15);
      }
      document.getElementById('panel').classList.add('active');
      document.getElementById('statusbar').innerText = `MODE: RED_OS | STATUS: ACCESSING_SECTOR_0${id}`;
    }

    function closeMod() {
      if (timer) clearInterval(timer);
      document.getElementById('panel').classList.remove('active');
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      document.getElementById('statusbar').innerText = `MODE: RED_OS | STATUS: STANDBY`;
      setTimeout(() => { document.getElementById('p-text').innerHTML = ""; }, 400);
    }
  </script>
</body>
</html>
