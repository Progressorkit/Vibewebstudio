<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vibe OS | Custom Tech</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --main-ui: #003366; 
      --glow-ui: #0077ff; 
      --header-red: #ff0000;
      --text-main: #ffffff;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #00050a;
      font-family: 'Courier New', monospace;
    }

    /* SIATKA TŁA */
    body::before {
      content: ""; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0, 51, 102, 0.15) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 51, 102, 0.15) 1px, transparent 1px);
      background-size: 35px 35px;
      z-index: 2; pointer-events: none;
    }

    #header-console {
      position: fixed; top: 0; left: 0; width: 100%;
      z-index: 2000; background: rgba(0,2,10,0.95);
      border-bottom: 2px solid var(--main-ui);
      padding: 15px 10px;
    }

    #header-console h1 {
      color: var(--header-red);
      font-size: 19px; text-align: center; letter-spacing: 5px;
      margin-bottom: 8px; text-shadow: 0 0 15px rgba(255,0,0,0.6);
    }

    /* ZMIANA NA BIAŁY TEKST - LEPSZA CZYTELNOŚĆ */
    .nav-instruction {
      font-size: 8px; text-align: center; color: #ffffff;
      letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase;
      opacity: 0.8; line-height: 1.4; text-shadow: 0 0 5px rgba(255,255,255,0.2);
    }

    .nav-horizontal {
      display: flex; justify-content: center; gap: 10px;
    }

    @keyframes pulse-navy {
      0% { box-shadow: 0 0 5px var(--main-ui); border-color: var(--main-ui); }
      50% { box-shadow: 0 0 12px var(--glow-ui); border-color: var(--glow-ui); }
      100% { box-shadow: 0 0 5px var(--main-ui); border-color: var(--main-ui); }
    }

    .nav-item {
      padding: 12px 15px; font-size: 11px; font-weight: bold;
      cursor: pointer; border: 1px solid var(--main-ui);
      background: rgba(0, 51, 102, 0.05); color: var(--main-ui);
      animation: pulse-navy 3s infinite ease-in-out;
      transition: all 0.3s;
    }

    .nav-item.active { 
      background: var(--main-ui); 
      color: #fff;
      animation: none; 
      box-shadow: 0 0 25px var(--glow-ui), inset 0 0 10px rgba(255,255,255,0.3);
      border-color: var(--glow-ui);
    }

    #center-container {
      position: fixed; left: 50%; top: 55%;
      transform: translate(-50%, -50%);
      z-index: 5; text-align: center;
      transition: 0.5s;
    }

    #center-container img { width: 240px; margin-bottom: 20px; opacity: 0.8; }

    .quick-contact {
      display: inline-block;
      padding: 12px 25px;
      border: 1px solid var(--main-ui);
      color: var(--text-main);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 2px;
      background: rgba(0, 51, 102, 0.2);
      transition: 0.3s;
    }
    .quick-contact:hover { background: var(--main-ui); box-shadow: 0 0 15px var(--glow-ui); }

    #panel {
      position: fixed; top: -100%; left: 50%;
      transform: translateX(-50%);
      width: 95%; max-width: 650px;
      height: 70vh;
      background: rgba(0, 5, 15, 0.98);
      border: 1px solid var(--main-ui);
      padding: 25px; z-index: 1500;
      transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
      display: flex; flex-direction: column;
      box-shadow: 0 0 40px #000;
    }

    #panel.active { top: 160px; border-color: var(--glow-ui); }

    #p-title {
      font-size: 16px; color: var(--glow-ui);
      border-bottom: 1px solid var(--main-ui);
      padding-bottom: 10px; font-weight: bold; letter-spacing: 2px;
    }

    #p-text {
      flex-grow: 1; overflow-y: auto;
      font-size: 15px; line-height: 1.8;
      color: var(--text-main); margin-top: 20px;
    }

    /* NOTKA O CENIE */
    .price-notice {
      margin-top: 20px; padding: 10px;
      border: 1px dashed var(--main-ui);
      font-size: 12px; color: #aaa;
      background: rgba(255, 255, 255, 0.02);
    }

    .close-area {
      margin-top: 20px; padding: 15px;
      border: 1px solid var(--main-ui);
      text-align: center; font-size: 11px;
      cursor: pointer; color: var(--main-ui);
      letter-spacing: 1px;
    }

    #statusbar { 
      position: fixed; bottom: 0; width: 100%; 
      background: #000; border-top: 1px solid var(--main-ui);
      padding: 10px 15px; font-size: 10px; z-index: 2100;
      display: flex; justify-content: space-between;
      color: var(--main-ui); letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <header id="header-console">
    <h1>VIBE WEB STUDIO</h1>
    <div class="nav-instruction">[ WYBIERZ MODUŁ PONIŻEJ, ABY ZAINICJOWAĆ SKANOWANIE DANYCH ]</div>
    <nav class="nav-horizontal">
      <div class="nav-item" id="btn1" onclick="openMod(1, 'PROFESJONALIZM', txt1, false)">BIO</div>
      <div class="nav-item" id="btn2" onclick="openMod(2, 'ZAKRES_DZIALAN', txt2, false)">TASK</div>
      <div class="nav-item" id="btn3" onclick="openMod(3, 'PROJEKTY_ZREALIZOWANE', txt3, true)">WORK</div>
    </nav>
  </header>

  <div id="center-container">
    <img src="./IMG_20260203_123501.png" alt="Logo">
    <br>
    <a href="mailto:progresskit7@gmail.com" class="quick-contact">[ ZAINICJUJ KONTAKT ]</a>
  </div>

  <div id="panel">
    <div id="p-title"></div>
    <div id="p-text"></div>
    <div class="close-area" onclick="closeMod()">[ POWRÓT DO KONSOLI ]</div>
  </div>

  <div id="statusbar">
    <div id="sys-log">ENCRYPTED_CONNECTION_ACTIVE</div>
    <div id="sys-time">00:00:00</div>
  </div>

  <script>
    let timer = null;

    const txt1 = `Nie uznaję półśrodków ani masowych szablonów. Każda strona to projekt od zera, wykuty z Twojego pomysłu i mojej wizji. Stosuję niekonwencjonalne rozwiązania UI, które wybijają się z nudnego standardu sieci. To nie jest "składanie z gotowców" – to cyfrowa manufaktura skupiona na profesjonalizmie i unikalności.`;
    
    /* DODANA NOTKA O CENIE W SEKCI TASK */
    const txt2 = `• Autorskie wizytówki www\n• Zaawansowane portfolio literackie i artystyczne\n• Niestandardowe systemy prezentacji treści\n• Szybkie wdrożenia (Static Hosting Expert)\n\n<div class="price-notice">[ INFO ] Każdy projekt wyceniany jest indywidualnie w zależności od stopnia skomplikowania interfejsu oraz unikalności funkcji.</div>`;
    
    const txt3 = `
      <div style="border-left: 2px solid #0055aa; padding-left: 15px; margin-bottom: 25px;">
        <strong>MAREK ZAWORSKI</strong><br><small style="color: #666;">System publikacji / Narracja</small><br>
        <a href="https://progressorkit.github.io/marekzaworski.github.io/" target="_blank" style="color:#0077ff; text-decoration:none; font-size:12px;">>> URUCHOM_PROJEKT</a>
      </div>
      <div style="border-left: 2px solid #0055aa; padding-left: 15px;">
        <strong>P. BARCZEWSKA</strong><br><small style="color: #666;">Portfolio literackie</small><br>
        <a href="https://pbarczewska.github.io/" target="_blank" style="color:#0077ff; text-decoration:none; font-size:12px;">>> URUCHOM_PROJEKT</a>
      </div>`;

    function openMod(id, title, content, isHtml) {
      document.getElementById('center-container').style.opacity = "0.05";
      document.getElementById('p-title').innerText = "> " + title;
      const pText = document.getElementById('p-text');
      
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('btn'+id).classList.add('active');

      if (timer) clearInterval(timer);

      if (isHtml || content.includes('<div')) { 
        pText.innerHTML = content; 
      } else {
        pText.innerHTML = "";
        let i = 0;
        timer = setInterval(() => {
          if (i < content.length) { pText.innerHTML += content[i++]; }
          else { clearInterval(timer); }
        }, 12);
      }
      document.getElementById('panel').classList.add('active');
    }

    function closeMod() {
      if (timer) clearInterval(timer);
      document.getElementById('panel').classList.remove('active');
      document.getElementById('center-container').style.opacity = "0.8";
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    }

    setInterval(() => {
      document.getElementById('sys-time').innerText = new Date().toLocaleTimeString();
    }, 1000);
  </script>
</body>
</html>
