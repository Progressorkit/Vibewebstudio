<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProgressorKit Studio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
color:#fff;
font-family:'Courier New',monospace;
overflow:hidden;
}

#bg-image{
position:fixed;
inset:0;
background:url('zdjtlo.png') center/cover no-repeat;
z-index:1;
}

#glass-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
z-index:2;
}

#header-console{
position:fixed;
top:0;
width:100%;
z-index:10;
background:#000;
border-bottom:2px solid #0077ff;
padding:15px;
text-align:center;
}

#header-console h1{
color:red;
letter-spacing:4px;
}

.nav-horizontal{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.nav-item{
padding:8px 15px;
border:1px solid #0077ff;
cursor:pointer;
font-size:10px;
}

.nav-item.active{
background:#0077ff;
color:#000;
}

#panel{
position:fixed;
top:120px;
left:50%;
transform:translateX(-50%);
width:95%;
max-width:1200px;
height:calc(100vh - 160px);
overflow-y:auto;
z-index:5;
}

.tile-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.tile{
background:rgba(0,20,40,0.6);
padding:20px;
border:1px solid #0077ff;
}

.tile-header{
color:#00aaff;
margin-bottom:10px;
}

img{
transition:0.3s;
}
img:hover{
transform:scale(1.03);
}

</style>
</head>

<body>

<div id="bg-image"></div>
<div id="glass-overlay"></div>

<header id="header-console">
<h1>PROGRESSORKIT STUDIO</h1>

<div class="nav-horizontal">
<div class="nav-item active" onclick="loadModule('HERO')">START</div>
<div class="nav-item" onclick="loadModule('DOWODY')">PROJEKTY</div>
<div class="nav-item" onclick="loadModule('KONTAKT')">KONTAKT</div>
</div>
</header>

<div id="panel">
<div id="p-content"></div>
</div>

<script>

const modules = {

HERO: `
<div class="tile">
<h2 style="font-size:40px;">
TERMINUJEMY CHAOS.<br>
<span style="color:red;">PROGRAMUJEMY ZYSK.</span>
</h2>

<p style="margin-top:20px;">
Projektujemy systemy dla firm, strony immersyjne od zera oraz rozwiązania .NET / AI nastawione na zysk dla Ciebie i Twojej firmy.
</p>
</div>
`,

DOWODY: `
<div class="tile-grid">

<div class="tile">
<div class="tile-header">LEJEK SPRZEDAŻOWY</div>
<h2>MAREK ZAWORSKI</h2>

<img src="zaworski1.png">
<img src="zaworski2.png">
<img src="zaworski3.png">

<p>Strona sprzedażowa konwertująca ruch w klientów.</p>
</div>

<div class="tile">
<div class="tile-header">SYSTEM</div>
<h2>RWR LOGISTYKA</h2>

<img src="rwr0.png">
<img src="rwr1.png">
<img src="rwr2.png">

<p>Automatyzacja procesów i dokumentów.</p>
</div>

<div class="tile">
<div class="tile-header">APP</div>
<h2>GLIKEMIA PREMIUM</h2>

<img src="apka1.jpg">
<img src="apka2.jpg">
<img src="apka3.jpg">

<p>Aplikacja mobilna do monitorowania zdrowia.</p>
</div>

<div class="tile">
<div class="tile-header">BRANDING</div>
<h2>P.A. BARCZEWSKA</h2>

<div style="
height:200px;
display:flex;
align-items:center;
justify-content:center;
border:1px dashed #0077ff;
color:#777;
">
W BUDOWIE
</div>

<p>Strona autorska dla pisarki (projekt w trakcie).</p>
</div>

</div>
`,

KONTAKT: `
<div class="tile">
<h2>MASZ PROJEKT?</h2>
<p>progressorkit@gmail.com</p>
</div>
`

};

function loadModule(key){
document.getElementById('p-content').innerHTML = modules[key];

document.querySelectorAll('.nav-item').forEach(el=>{
el.classList.remove('active');
if(el.innerText===key || (key==='HERO' && el.innerText==='START')){
el.classList.add('active');
}
});
}

window.onload = ()=>{
loadModule('HERO');
};

</script>

</body>
</html>
