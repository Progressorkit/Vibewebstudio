<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PROGRESSKIT STUDIO | ARCHITEKT ZYSKU</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ui-blue: #0077ff;
      --ui-blue-glow: #00aaff;
      --ui-red: #ff0000;
      --ui-red-glow: #ff4444;
      --glass-white: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.15);
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #000; font-family: 'Courier New', monospace; color: #fff;
    }

    /* BACKGROUND LAYER */
    #bg-image { 
      position: fixed; inset: 0; 
      background: url('zdjtlo.png') no-repeat center center; 
      background-size: cover; z-index: 1; pointer-events: none; 
    }

    /* GLASS OVERLAY WITH GRID */
    #glass-overlay { 
      position: fixed; inset: 0; z-index: 2; 
      background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%), rgba(0, 5, 15, 0.6);
      backdrop-filter: blur(10px) brightness(0.6);
      -webkit-backdrop-filter: blur(10px) brightness(0.6);
      pointer-events: none; 
    }

    /* HEADER */
    #header-console {
      top: 0; left: 0; width: 100%; z-index: 500; position: fixed;
      background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--ui-blue);
      padding: 10px; text-align: center;
    }

    #header-console h1 {
      color: var(--ui-red); font-size: clamp(14px, 4vw, 18px); letter-spacing: 3px; font-weight: 900;
      text-shadow: 0 0 10px var(--ui-red); margin-bottom: 5px;
    }

    .nav-horizontal { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    
    .nav-item {
      padding: 6px 12px; font-size: 9px; font-weight: 900; cursor: pointer;
      border: 1px solid var(--ui-blue); color: #fff; transition: 0.3s;
      background: rgba(0, 119, 255, 0.1); border-radius: 4px;
    }

    .nav-item:hover, .nav-item.active { background: var(--ui-blue); color: #000; box-shadow: 0 0 15px var(--ui-blue-glow); }
    .nav-item.important { border-color: var(--ui-red); color: var(--ui-red-glow); }

    /* CONTENT ENGINE */
    #panel {
      z-index: 300; position: fixed; top: 110px; left: 50%;
      transform: translateX(-50%); width: 95%; max-width: 1200px;
      height: calc(100vh - 170px); overflow-y: auto;
      padding: 10px 10px 80px 10px; scroll-behavior: smooth;
    }

    /* TILES - GLASSMorphism WHITE STYLE */
    .tile-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
    
    .tile {
      background: var(--glass-white);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 24px; 
      padding: 25px;
      position: relative;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); 
      animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      opacity: 0; transform: translateY(30px);
    }

    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

    .tile-header { 
      color: var(--ui-blue-glow); font-size: 11px; font-weight: bold; 
      margin-bottom: 15px; border-left: 4px solid var(--ui-red); padding-left: 12px;
      text-transform: uppercase; letter-spacing: 2px;
    }

    .tile h2 { font-size: clamp(20px, 5vw, 26px); margin-bottom: 12px; color: #fff; letter-spacing: -0.5px; line-height: 1.1; }
    .tile p { font-size: 14px; line-height: 1.5; color: #ccc; margin-bottom: 15px; }

    /* PROJECT SLIDER */
    .project-gallery {
      width: 100%; height: 180px; border-radius: 16px; overflow: hidden;
      margin-bottom: 20px; position: relative; background: #000;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .project-gallery img {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; opacity: 0; transition: opacity 0.8s ease-in-out;
    }
    .project-gallery img.active { opacity: 1; }

    /* BRIEF STYLES */
    .brief-section { margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
    .brief-section h3 { color: var(--ui-red); font-size: 14px; margin-bottom: 10px; }
    .brief-item { margin-bottom: 15px; }
    .brief-item label { display: block; font-size: 11px; color: var(--ui-blue-glow); margin-bottom: 5px; }
    .brief-item textarea { 
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); 
      color: #fff; padding: 10px; font-family: 'Courier New', monospace; border-radius: 8px; resize: none;
    }

    /* UI ELEMENTS */
    .price-tag { font-size: 22px; color: var(--ui-red-glow); font-weight: 900; display: block; margin: 15px 0; }
    
    .cta-button { 
      display: inline-block; width: 100%; text-align: center;
      padding: 14px; background: var(--ui-red); color: #fff; 
      text-decoration: none; font-weight: 900; font-size: 11px; letter-spacing: 2px;
      border: none; cursor: pointer; transition: 0.3s; margin-top: 10px; border-radius: 8px;
    }
    .cta-button:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; transform: translateY(-2px); }
    .cta-button.fb { background: #1877F2; }

    .stat-box { background: rgba(0,0,0,0.3); padding: 12px; border: 1px dashed var(--ui-blue); border-radius: 8px; margin-top: 10px; }
    .stat-num { color: var(--ui-blue-glow); font-size: 16px; font-weight: 900; }

    /* STATUSBAR */
    #statusbar {
      z-index: 500; position: fixed; bottom: 0; width: 100%;
      background: rgba(0,0,0,0.9); padding: 10px 15px; font-size: 9px;
      display: flex; justify-content: space-between; color: var(--ui-blue); border-top: 1px solid var(--ui-blue);
    }

    /* PRINT OPTIMIZATION */
    @media print {
      body { background: #fff !important; color: #000 !important; overflow: visible !important; }
      #header-console, #statusbar, #bg-image, #glass-overlay, .nav-horizontal, .cta-button { display: none !important; }
      #panel { position: static !important; width: 100% !important; height: auto !important; transform: none !important; padding: 0 !important; overflow: visible !important; }
      .tile { background: #fff !important; color: #000 !important; border: 1px solid #000 !important; box-shadow: none !important; border-radius: 0 !important; page-break-inside: avoid; }
      .tile h2, .tile-header { color: #000 !important; border-left: 4px solid #000 !important; }
      .brief-item textarea { border: 1px solid #000 !important; color: #000 !important; background: #fff !important; }
      .brief-section h3 { color: #000 !important; text-decoration: underline; }
      .brief-item label { color: #555 !important; }
    }

    #panel::-webkit-scrollbar { width: 3px; }
    #panel::-webkit-scrollbar-thumb { background: var(--ui-red); border-radius: 10px; }
  </style>
</head>
<body>

  <div id="bg-image"></div>
  <div id="glass-overlay"></div>

  <header id="header-console">
    <h1>PROGRESSKIT STUDIO // PROFIT MAXIMIZER</h1>
    <nav class="nav-horizontal">
      <div class="nav-item active" onclick="loadModule('HERO')">START</div>
      <div class="nav-item" onclick="loadModule('ANALIZA')">PROBLEM/SOL</div>
      <div class="nav-item" onclick="loadModule('DOWODY')">CASE STUDIES</div>
      <div class="nav-item" onclick="loadModule('CENNIK')">OFERTA</div>
      <div class="nav-item" onclick="loadModule('EDGE')">PROCES/EDGE</div>
      <div class="nav-item important" onclick="loadModule('KONTAKT')">REZERWUJ TERMIN</div>
    </nav>
  </header>

  <div id="panel">
    <div id="p-content"></div>
  </div>

  <div id="statusbar">
    <div>SYSTEM: ACTIVE // ROI_OPTIMIZER: ON // VIBE_OS: v4.0</div>
    <div id="sys-time">00:00:00</div>
  </div>

  <script>
    const modules = {
      HERO: `
        <div class="tile" style="text-align: center;">

          <button class="cta-button" onclick="loadModule('DOWODY')">ZOBACZ PROJEKTY</button>
          <button class="cta-button" style="background:transparent; border: 1px solid #fff;" onclick="loadModule('KONTAKT')">UMÓW ROZMOWĘ</button>
        </div>
      `,

      ANALIZA: `
        <div class="tile-grid">
          <div class="tile">
            <div class="tile-header">DIAGNOZA_BŁĘDÓW</div>
            <p>• Strona, która tylko "ładnie wygląda", ale nie sprzedaje.<br>• Chaos w procesach i ręczne przepisywanie danych.<br>• Brak skalowalności.</p>
          </div>
          <div class="tile">
            <div class="tile-header">ROZWIĄZANIE_VIBE</div>
            <p>• Leady zamieniane w sprzedaż dzięki UX.<br>• Customowe systemy ERP/CRM.<br>• Integracje AI pracujące 24/7.</p>
          </div>
        </div>
      `,

      DOWODY: `
        <div class="tile-grid">
          <div class="tile">
            <div class="tile-header">AUTOR: MAREK ZAWORSKI</div>
            <div class="project-gallery">
              <img src="zaworski1.png" class="active"><img src="zaworski2.png"><img src="zaworski3.png"><img src="zaworski4.png"><img src="zaworski5.png"><img src="zaworski6.png"><img src="zaworski7.png">
            </div>
            <h2>LEJEK SPRZEDAŻOWY</h2>
            <p>Problem: Niska konwersja z ruchu organicznego i brak automatyzacji.</p>
            <div class="stat-box">WYNIK: <span class="stat-num">SKALOWALNY SYSTEM</span></div>
          </div>
          <div class="tile">
            <div class="tile-header">SYSTEM: RWR SYSTEM</div>
            <div class="project-gallery">
              <img src="rwr0.png" class="active"><img src="rwr1.png"><img src="rwr2.png"><img src="rwr3.png"><img src="rwr4.png"><img src="rwr5.png">
            </div>
            <h2>ZARZĄDZANIE KONTROLERAMI</h2>
            <p>Problem: Chaos w raportowaniu i błędy w fakturach.</p>
            <div class="stat-box">WYNIK: <span class="stat-num">-40% CZASU</span> obsługi.</div>
          </div>
          <div class="tile">
            <div class="tile-header">APLIKACJA: GLIKEMIA PREMIUM</div>
            <div class="project-gallery">
              <img src="apka1.jpg" class="active"><img src="apka2.jpg"><img src="apka3.jpg"><img src="apka4.jpg"><img src="apka6.jpg">
            </div>
            <h2>MONITOROWANIE ZDROWIA</h2>
            <p>Kompleksowe rozwiązanie mobile dla diabetyków z analityką danych.</p>
            <div class="stat-box">STATUS: <span class="stat-num">GOTOWE DO SKALOWANIA</span></div>
          </div>
        </div>
      `,

      CENNIK: `
        <div class="tile-grid">
          <div class="tile">
            <div class="tile-header">WIZYTÓWKA PREMIUM</div>
            <h2>PAKIET: START</h2>
            <p>High-Performance Web. Czysty kod, pełna optymalizacja.</p>
            <span class="price-tag">OD 800 €</span>
          </div>
          <div class="tile" style="border-color: var(--ui-red);">
            <div class="tile-header">LANDING + KONWERSJA</div>
            <h2>PAKIET: GROWTH</h2>
            <p>Lejek sprzedażowy + analityka i testy A/B.</p>
            <span class="price-tag">1500 – 3000 €</span>
          </div>
        </div>
      `,

      EDGE: `
        <div class="tile-grid">
          <div class="tile">
            <div class="tile-header">DLACZEGO MY?</div>
            <p><strong>ZERO SZABLONÓW:</strong> Kod powstaje od zera.<br><br><strong>WŁASNOŚĆ:</strong> Kod należy do Ciebie, bez abonamentów.</p>
          </div>
          <div class="tile">
            <div class="tile-header">PROCES</div>
            <p>1. Analiza krytyczna.<br>2. Projekt UX/UI.<br>3. Development .NET/AI.<br>4. Wdrożenie.</p>
          </div>
        </div>
      `,

      KONTAKT: `
        <div class="tile">
          <div class="tile-header">PROTOKÓŁ_KOMUNIKACJI</div>
          <h2>MASZ PROJEKT? WYŚLIJ BRIEF.</h2>
          <p>E-MAIL: <span style="color:var(--ui-red-glow);">progresskit7@gmail.com</span></p>
          <button class="cta-button" onclick="loadModule('BRIEF')">ROZPOCZNIJ BRIEF PROJEKTOWY</button>
          <a href="https://www.facebook.com/profile.php?id=61574306963115" target="_blank" class="cta-button fb">PROFIL FACEBOOK</a>
        </div>
      `,

      BRIEF: `
        <div class="tile">
          <div class="tile-header">DOKUMENTACJA: BRIEF PROJEKTOWY</div>
          <h2>ARCHITEKTURA ZYSKU</h2>
          <p>Wypełnij poniższe pola. Możesz wydrukować ten dokument do PDF i wysłać na nasz e-mail.</p>
          
          <div class="brief-section">
            <h3>01. FUNDAMENT BIZNESOWY</h3>
            <div class="brief-item">
              <label>Główny problem, który rozwiązuje Twój biznes:</label>
              <textarea rows="2" placeholder="Napisz tutaj..."></textarea>
            </div>
            <div class="brief-item">
              <label>Kim jest Twój idealny klient?</label>
              <textarea rows="2" placeholder="Opisz personę..."></textarea>
            </div>
          </div>

          <div class="brief-section">
            <h3>02. CELE I TECHNOLOGIA</h3>
            <div class="brief-item">
              <label>Główne cele (np. sprzedaż, leady, automatyzacja):</label>
              <textarea rows="2"></textarea>
            </div>
            <div class="brief-item">
              <label>Wymagane integracje (np. CRM, AI, Płatności):</label>
              <textarea rows="2"></textarea>
            </div>
          </div>

          <div class="brief-section">
            <h3>03. LOGISTYKA</h3>
            <div class="brief-item">
              <label>Zakładany budżet projektowy:</label>
              <textarea rows="1" placeholder="np. Pakiet GROWTH"></textarea>
            </div>
            <div class="brief-item">
              <label>Nieprzekraczalny termin wdrożenia:</label>
              <textarea rows="1" placeholder="Data..."></textarea>
            </div>
          </div>

          <button class="cta-button" onclick="window.print()" style="background:#222; border: 1px solid var(--ui-blue-glow);">ZAPISZ BRIEF DO PDF / DRUKUJ</button>
          <button class="cta-button" onclick="loadModule('KONTAKT')" style="background:transparent; border:none; color:#555; font-size:10px;">ANULUJ I WRÓĆ</button>
        </div>
      `
    };

    function startSliders() {
      const galleries = document.querySelectorAll('.project-gallery');
      galleries.forEach(gallery => {
        let images = gallery.querySelectorAll('img');
        let current = 0;
        if(images.length > 1) {
          setInterval(() => {
            images[current].classList.remove('active');
            current = (current + 1) % images.length;
            images[current].classList.add('active');
          }, 3000);
        }
      });
    }

    function loadModule(key) {
      const content = document.getElementById('p-content');
      content.innerHTML = modules[key];
      
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
        if(item.innerText === key || (key === 'HERO' && item.innerText === 'START')) {
          item.classList.add('active');
        }
      });

      if(key === 'DOWODY') startSliders();
      document.getElementById('panel').scrollTop = 0;
    }

    window.onload = () => {
      loadModule('HERO');
      setInterval(() => { 
        document.getElementById('sys-time').innerText = new Date().toLocaleTimeString(); 
      }, 1000);
    };
  </script>
</body>
</html>
