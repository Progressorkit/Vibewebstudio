<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vibe Web Studio</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --main-ui: #0077ff;
      --glow-ui: #00aaff;
      --header-red: #ff0000;
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #000; font-family: 'Courier New', monospace; color: #fff;
    }

    #bg-image { position: fixed; inset: 0; background: url('zdjtlo.png') no-repeat center center; background-size: cover; z-index: 1; }
    #glass-overlay { position: fixed; inset: 0; z-index: 2; background: rgba(0, 0, 0, 0.4); }

    /* HEADER & NAV */
    #header-console {
      top: 0; left: 0; width: 100%; z-index: 100; position: fixed;
      background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--main-ui);
      padding: 20px 10px; text-align: center;
    }

    #header-console h1 {
      color: var(--header-red); font-size: 24px; letter-spacing: 10px; font-weight: 900;
      text-shadow: 0 0 15px rgba(255,0,0,0.6); margin-bottom: 15px;
    }

    .nav-horizontal { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
    
    .nav-item {
      padding: 10px 20px; font-size: 11px; font-weight: 900; cursor: pointer;
      border: 2px solid var(--main-ui); background: rgba(0, 119, 255, 0.05);
      color: #fff; transition: all 0.4s ease; letter-spacing: 1px;
      box-shadow: 0 0 10px rgba(0, 119, 255, 0.4);
      text-shadow: 0 0 5px rgba(0, 119, 255, 0.5);
    }

    .nav-item:hover { 
      background: rgba(0, 119, 255, 0.2); 
      box-shadow: 0 0 25px var(--glow-ui); 
      text-shadow: 0 0 12px #fff;
    }

    .nav-item.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 30px #fff; }

    /* PANEL - BLACK GLASS MORPHISM 65% */
    #panel {
      z-index: 110; position: fixed; top: 110%; left: 50%;
      transform: translateX(-50%); width: 95%; max-width: 1100px;
      height: 75vh; 
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(0, 119, 255, 0.4);
      padding: 35px; transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
      overflow-y: auto; opacity: 0;
    }
    #panel.active { top: 160px; opacity: 1; transform: translateX(-50%) translateY(0); }

    .section-title { color: var(--glow-ui); font-size: 18px; margin: 25px 0 10px; font-weight: bold; text-transform: uppercase; }
    .sell-highlight { color: #fff; border-left: 3px solid var(--header-red); padding-left: 15px; margin: 20px 0; font-style: italic; }
    
    .tech-table { width: 100%; border-collapse: collapse; margin: 15px 0; background: rgba(255,255,255,0.02); }
    .tech-table th, .tech-table td { border: 1px solid rgba(0, 119, 255, 0.3); padding: 12px; text-align: left; font-size: 13px; }
    
    .project-link { display: inline-block; margin-top: 10px; color: var(--glow-ui); text-decoration: none; font-weight: bold; font-size: 12px; border: 1px solid var(--glow-ui); padding: 5px 10px; transition: 0.3s; }
    .project-link:hover { background: var(--glow-ui); color: #000; }

    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
    .gallery-item { border: 1px solid rgba(255,255,255,0.1); padding: 5px; background: rgba(0,0,0,0.3); }
    .gallery-item img { width: 100%; height: auto; display: block; }

    #center-container { z-index: 90; position: fixed; left: 50%; top: 55%; transform: translate(-50%, -50%); text-align: center; }
    .center-logo { width: 180px; opacity: 0.7; }

    #statusbar {
      z-index: 120; position: fixed; bottom: 0; width: 100%;
      background: #000; padding: 12px 25px; font-size: 10px;
      display: flex; justify-content: space-between; color: var(--main-ui); border-top: 1px solid var(--main-ui);
    }
  </style>
</head>
<body>

  <div id="bg-image"></div>
  <div id="glass-overlay"></div>

  <header id="header-console">
    <h1>VIBE WEB STUDIO</h1>
    <nav class="nav-horizontal">
      <div class="nav-item" id="btn1" onclick="openMod(1, 'BIO')">BIO</div>
      <div class="nav-item" id="btn2" onclick="openMod(2, 'GLIKPRO')">🦅 GLIKPRO</div>
      <div class="nav-item" id="btn3" onclick="openMod(3, 'PORTFOLIO')">📊 PROJEKTY HTML</div>
      <div class="nav-item" id="btn4" onclick="openMod(4, 'PROCES')">🚀 PROCES (SALES)</div>
    </nav>
  </header>

  <div id="center-container">
    <img src="IMG_20260203_123501.png" alt="Logo" class="center-logo">
  </div>

  <div id="panel">
    <div id="p-text"></div>
    <div style="margin-top: 50px; color: #555; cursor: pointer; text-align: center; font-size: 11px;" onclick="closeMod()">[ ZAMKNIJ_SYSTEM ]</div>
  </div>

  <div id="statusbar">
    <div>SYSTEM_STATUS: ACTIVE // AQUILAAI_CORE: ONLINE</div>
    <div id="sys-time">00:00:00</div>
  </div>

  <script>
    const content = {
      BIO: `Projektuję i wdrażam autorskie strony internetowe dla marek osobistych i twórców, którzy nie chcą wyglądać jak reszta. Każdy interfejs powstaje od zera — bez szablonów, bez gotowców, bez kompromisów technicznych. Łączę surowy, nowoczesny design z precyzyjnym celem sprzedażowym.`,
      
      GLIKPRO: `
        <div class="section-title">🦅 GLIKPRO: EKOSYSTEM PRECYZJI (Powered by AquilaAI)</div>
        <p>GlikPro to nie jest kolejna "apka do cukru". To natywny, pancerny ekosystem mobilny stworzony dla tych, którzy wymagają absolutnej kontroli i szybkości. Koniec z mulącymi rozwiązaniami webowymi i śmieciowym kodem. Tu rządzi .NET MAUI i silnik AquilaAI.</p>
        
        <div class="section-title">🛡️ FILOZOFIA PROJEKTU: NATIVE OR NOTHING</div>
        <ul>
          <li><strong>Zero Lagów:</strong> Architektura C# i .NET zapewnia płynność, której nie osiągnie żaden JavaScript.</li>
          <li><strong>Offline First:</strong> Twoje dane są w telefonie, a nie tylko w chmurze. System działa w tunelu metra i na szczycie góry.</li>
          <li><strong>Zero WP:</strong> Nie używamy półśrodków. Czysty kod, pełna kontrola nad pamięcią, agresywna wydajność.</li>
        </ul>

        <div class="section-title">🧠 MÓZG SYSTEMU: AQUILLAAI (THE BRAIN)</div>
        <p>Serce GlikPro to autorski backend w FastAPI, który komunikuje się bezpośrednio z modelem Llama 3.1 przez ultra-szybkie API Groq.</p>
        <table class="tech-table">
          <tr><th>Funkcja</th><th>Opis Techniczny</th><th>Szybkość Reakcji</th></tr>
          <tr><td>Analiza danych</td><td>W czasie < 1s dzięki Groq LPU.</td><td>Błyskawiczna</td></tr>
          <tr><td>Adaptacja Stylu</td><td>Trzy tryby komunikacji: Senior, Pro, Youth.</td><td>Real-time</td></tr>
          <tr><td>Kontekst Medyczny</td><td>Wykrywanie trendów, hipoglikemii i błędów dietetycznych w czasie rzeczywistym.</td><td>Instant</td></tr>
        </table>

        <div class="gallery-grid">
          <div class="gallery-item"><img src="1000015077.jpg"></div>
          <div class="gallery-item"><img src="1000015076.jpg"></div>
          <div class="gallery-item"><img src="1000006255.jpg"></div>
        </div>

        <div class="section-title">☢️ SPECYFIKACJA TECHNICZNA (Dla kumatych)</div>
        <ul>
          <li>Frontend: .NET MAUI (C#) – Cross-platformowa potęga.</li>
          <li>Backend: Python 3.12 / FastAPI – Skalowalność i szybkość.</li>
          <li>AI Engine: Groq Cloud + Llama 3.1 70B – Najszybsza inteligencja na planecie.</li>
          <li>Database: SQLite (Local) + PostgreSQL (Cloud Sync).</li>
        </ul>
      `,

      PORTFOLIO: `
        <div class="section-title">📊 SYSTEM RWR (RAPORTY I ROZLICZENIA)</div>
        <p>Zaawansowana platforma do ewidencji pracy i kontroli. Automatyczne generowanie zestawień PDF.</p>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="rwr1.png"></div>
            <div class="gallery-item"><img src="rwr2.png"></div>
        </div>

        <div class="section-title">✍️ P.A. BARCZEWSKA - AUTORKA</div>
        <p>Oficjalna wizytówka premium stworzona w czystym HTML/CSS. Minimalizm skrojony pod świat literatury i marki osobistej autorki.</p>
        <a href="https://progressorkit.github.io/pabarczewska.github.io/" target="_blank" class="project-link">URUCHOM_PROJEKT ></a>

        <div class="section-title">📖 MAREK ZAWORSKI - AUTOR SERII "CENA DECYZJI"</div>
        <p>Dedykowany interfejs dla autora, skupiony na prezentacji dorobku literackiego i konwersji czytelnika.</p>
        <a href="https://progressorkit.github.io/marekzaworski.github.io/" target="_blank" class="project-link">URUCHOM_PROJEKT ></a>
      `,

      PROCES: `
        <div class="section-title">🚀 DLACZEGO VIBE WEB STUDIO? (MAX SALES)</div>
        <div class="sell-highlight">"Większość agencji sprzedaje Ci kolorowe obrazki. My sprzedajemy Ci dominację technologiczną."</div>
        
        <p><strong>01 // ANALIZA AGRESYWNA:</strong> Nie pytamy, jakie kolory lubisz. Analizujemy Twój rynek i znajdujemy luki, które Twoja nowa strona musi wypełnić, aby zarabiać.</p>
        <p style="margin-top:15px;"><strong>02 // ARCHITEKTURA NATIVE:</strong> Twoja strona nie będzie "ciężkim klockiem" na WordPressie. Piszemy czysty kod, który Google uwielbia, a użytkownicy ładują w ułamku sekundy.</p>
        <p style="margin-top:15px;"><strong>03 // IMPLEMENTACJA AI (OPCJONALNIE):</strong> Wdrażamy systemy AquilaAI, które automatyzują obsługę klienta lub analizę danych bezpośrednio na Twojej stronie.</p>
        <p style="margin-top:15px;"><strong>04 // PUBLIKACJA I WSPARCIE:</strong> Nie zostawiamy Cię z plikami. Hostujemy, optymalizujemy i dbamy, aby system był zawsze ONLINE.</p>

        <div class="sell-highlight">Jeśli szukasz "taniej stronki", idź do konkurencji. Jeśli szukasz narzędzia, które zmiażdży Twoją konkurencję — jesteś w dobrym miejscu.</div>
      `
    };

    function openMod(id, key) {
      document.getElementById('center-container').style.opacity = "0.05";
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('btn' + id).classList.add('active');
      document.getElementById('p-text').innerHTML = content[key];
      document.getElementById('panel').classList.add('active');
    }

    function closeMod() {
      document.getElementById('panel').classList.remove('active');
      document.getElementById('center-container').style.opacity = "1";
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    }

    setInterval(() => { 
        document.getElementById('sys-time').innerText = new Date().toLocaleTimeString(); 
    }, 1000);
  </script>
</body>
</html>
