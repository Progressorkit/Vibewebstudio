<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ProgressorKit Studio | Architekt Zysku</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ui-blue: #0077ff;
      --ui-blue-glow: #00aaff;
      --ui-red: #ff0000;
      --ui-red-glow: #ff4444;
      --glass: rgba(0, 5, 15, 0.85);
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #000; font-family: 'Courier New', monospace; color: #fff;
    }

    #bg-image { 
      position: fixed; inset: 0; 
      background: url('zdjtlo.png') no-repeat center center; 
      background-size: cover; z-index: 1; pointer-events: none; 
    }

    #glass-overlay { 
      position: fixed; inset: 0; z-index: 2; 
      background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.9) 100%), rgba(0, 8, 20, 0.7);
      backdrop-filter: blur(15px) brightness(0.5);
      -webkit-backdrop-filter: blur(15px) brightness(0.5);
      pointer-events: none; 
    }

    #glass-overlay::after {
      content: ""; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(0, 119, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 119, 255, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    #header-console {
      top: 0; left: 0; width: 100%; z-index: 500; position: fixed;
      background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--ui-blue);
      padding: 15px; text-align: center;
    }

    #header-console h1 {
      color: var(--ui-red); font-size: 18px; letter-spacing: 5px; font-weight: 900;
      text-shadow: 0 0 10px var(--ui-red);
    }

    .nav-horizontal { display: flex; justify-content: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    
    .nav-item {
      padding: 8px 15px; font-size: 10px; font-weight: 900; cursor: pointer;
      border: 1px solid var(--ui-blue); color: #fff; transition: 0.3s;
      background: rgba(0, 119, 255, 0.1);
    }

    .nav-item:hover, .nav-item.active { background: var(--ui-blue); color: #000; box-shadow: 0 0 15px var(--ui-blue-glow); }
    .nav-item.important { border-color: var(--ui-red); color: var(--ui-red-glow); }

    #panel {
      z-index: 300; position: fixed; top: 120px; left: 50%;
      transform: translateX(-50%); width: 95%; max-width: 1200px;
      height: calc(100vh - 180px); overflow-y: auto;
      padding-bottom: 50px; scroll-behavior: smooth;
    }

    .tile-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 40px; }
    
    .tile {
      background: rgba(0, 20, 40, 0.6); backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 119, 255, 0.2); padding: 25px;
      animation: fadeIn 0.6s ease forwards; opacity: 0; transform: translateY(20px);
    }

    .tile img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      margin-bottom: 10px;
    }

    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

    .tile-header { 
      color: var(--ui-blue-glow); font-size: 14px; font-weight: bold; 
      margin-bottom: 15px; border-left: 4px solid var(--ui-red); padding-left: 12px;
      text-transform: uppercase; letter-spacing: 2px;
    }

    .tile h2 { font-size: 24px; margin-bottom: 10px; color: #fff; }
    .tile p { font-size: 14px; line-height: 1.6; color: #bbb; margin-bottom: 15px; }

    .price-tag { font-size: 20px; color: var(--ui-red-glow); font-weight: 900; display: block; margin: 10px 0; }
    .cta-button { 
      display: inline-block; padding: 12px 25px; background: var(--ui-red); color: #fff; 
      text-decoration: none; font-weight: 900; font-size: 12px; letter-spacing: 2px;
      border: none; cursor: pointer; transition: 0.3s; margin-top: 10px;
    }
    .cta-button:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }

    .stat-box { background: rgba(255,255,255,0.05); padding: 10px; border: 1px dashed var(--ui-blue); margin-top: 10px; }
    .stat-num { color: var(--ui-blue-glow); font-size: 18px; font-weight: 900; }

    #statusbar {
      z-index: 500; position: fixed; bottom: 0; width: 100%;
      background: #000; padding: 10px 20px; font-size: 10px;
      display: flex; justify-content: space-between; color: var(--ui-blue); border-top: 1px solid var(--ui-blue);
    }

    #panel::-webkit-scrollbar { width: 4px; }
    #panel::-webkit-scrollbar-thumb { background: var(--ui-red); }
  </style>
</head>
<body>

<div id="bg-image"></div>
<div id="glass-overlay"></div>

<header id="header-console">
  <h1>PROGRESSORKIT STUDIO // PROFIT MAXIMIZER</h1>
  <nav class="nav-horizontal">
    <div class="nav-item active" onclick="loadModule('HERO')">START</div>
    <div class="nav-item" onclick="loadModule('ANALIZA')">PROBLEM/SOL</div>
    <div class="nav-item" onclick="loadModule('DOWODY')">CASE STUDIES</div>
    <div class="nav-item" onclick="loadModule('CENNIK')">OFERTA</div>
    <div class="nav-item" onclick="loadModule('EDGE')">PROCES/EDGE</div>
    <div class="nav-item important" onclick="loadModule('KONTAKT')">REZERWUJ TERMIN</div>
  </nav>
</header>

<div id="panel">
  <div id="p-content"></div>
</div>

<div id="statusbar">
  <div>SYSTEM: ACTIVE // ROI_OPTIMIZER: ON // VIBE_OS: v4.0</div>
  <div id="sys-time">00:00:00</div>
</div>

<script>
const modules = {
DOWODY: `
<div class="tile-grid">
  <div class="tile">
    <div class="tile-header">CASE_STUDY_01</div>
    <h2>+48% KONWERSJI</h2>
    <p>E-commerce redesign</p>
  </div>

  <div class="tile">
    <div class="tile-header">CASE_STUDY_02</div>
    <h2>-40% CZASU</h2>
    <p>System logistyczny</p>
  </div>
</div>

<div class="tile-grid">
  <div class="tile">
    <img src="zaworski1.png">
    <h2>MAREK ZAWORSKI</h2>
    <p>Lejek sprzedażowy</p>
  </div>

  <div class="tile">
    <img src="rwr0.png">
    <h2>RWR SYSTEM</h2>
    <p>Zarządzanie kontrolerami</p>
  </div>

  <div class="tile">
    <img src="apka1.jpg">
    <h2>GLIKEMIA PREMIUM</h2>
    <p>Aplikacja mobilna</p>
  </div>

  <div class="tile">
    <h2>P.A. BARCZEWSKA</h2>
    <p>Strona w budowie</p>
  </div>
</div>
`
};

function loadModule(key) {
  document.getElementById('p-content').innerHTML = modules[key];
}

window.onload = () => {
  loadModule('DOWODY');
  setInterval(() => {
    document.getElementById('sys-time').innerText = new Date().toLocaleTimeString();
  }, 1000);
};
</script>

</body>
</html>
