<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vibe Web Studio | Cyber OS</title>

  <style>
    /* RESET I ZMIENNE SYSTEMOWE */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ui-blue: #0077ff;
      --ui-blue-glow: #00aaff;
      --ui-red: #ff0000;
      --ui-red-glow: #ff4444;
      --glass: rgba(0, 5, 15, 0.85);
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #000; font-family: 'Courier New', monospace; color: #fff;
    }

    /* WARSTWA TŁA (ZDJĘCIE) */
    #bg-image { 
      position: fixed; inset: 0; 
      background: url('zdjtlo.png') no-repeat center center; 
      background-size: cover; 
      z-index: 1; 
      pointer-events: none; 
    }

    /* CIEMNE SZKŁO Z SIATKĄ */
    #glass-overlay { 
      position: fixed; inset: 0; 
      z-index: 2; 
      background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%), rgba(0, 8, 20, 0.6);
      backdrop-filter: blur(12px) brightness(0.6);
      -webkit-backdrop-filter: blur(12px) brightness(0.6);
      pointer-events: none; 
    }

    #glass-overlay::after {
      content: ""; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(0, 119, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 119, 255, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    /* KONSOLA NAGŁÓWKA */
    #header-console {
      top: 0; left: 0; width: 100%; z-index: 200; position: fixed;
      background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--ui-blue);
      padding: 15px; text-align: center;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.8);
    }

    #header-console h1 {
      color: var(--ui-red); font-size: 20px; letter-spacing: 8px; font-weight: 900;
      text-shadow: 0 0 15px var(--ui-red); margin-bottom: 10px;
    }

    .nav-horizontal { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    
    .nav-item {
      padding: 8px 12px; font-size: 10px; font-weight: 900; cursor: pointer;
      border: 1px solid var(--ui-blue); background: rgba(0, 119, 255, 0.1);
      color: #fff; transition: all 0.3s; letter-spacing: 1px;
      position: relative; overflow: hidden;
    }

    .nav-item:hover { background: var(--ui-blue); color: #000; box-shadow: 0 0 15px var(--ui-blue-glow); }
    .nav-item.active { background: var(--ui-red); color: #fff; border-color: var(--ui-red); box-shadow: 0 0 20px var(--ui-red-glow); }

    /* PANEL GŁÓWNY (KAFELKI) */
    #panel {
      z-index: 300; position: fixed; top: 110%; left: 50%;
      transform: translateX(-50%); width: 95%; max-width: 1200px;
      height: 75vh; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      overflow-y: auto; opacity: 0; visibility: hidden;
      padding-bottom: 50px;
    }
    #panel.active { top: 140px; opacity: 1; visibility: visible; }

    /* UKŁAD KAFELKÓW */
    .tile-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
      gap: 20px; padding: 10px;
    }

    /* STYL POJEDYNCZEGO KAFELKA */
    .content-tile {
      background: rgba(0, 20, 40, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 119, 255, 0.3);
      padding: 20px;
      position: relative;
      transition: 0.3s;
      animation: tileIn 0.5s ease forwards;
      opacity: 0; transform: translateY(30px);
    }

    @keyframes tileIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .content-tile:hover { border-color: var(--ui-blue-glow); box-shadow: inset 0 0 15px rgba(0, 119, 255, 0.2); }
    
    .tile-header { 
      color: var(--ui-blue-glow); font-size: 14px; font-weight: bold; 
      margin-bottom: 15px; border-left: 3px solid var(--ui-red); padding-left: 10px;
      text-transform: uppercase;
    }

    .content-tile p { font-size: 13px; line-height: 1.6; color: #ccc; }

    /* DODATKI UI */
    .sell-alert { 
      background: rgba(255, 0, 0, 0.1); border: 1px solid var(--ui-red); 
      padding: 15px; font-style: italic; font-size: 11px; margin-top: 15px;
      color: #fff;
    }

    .stat-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 11px; }
    .stat-val { color: var(--ui-blue-glow); font-weight: bold; }

    #center-container { z-index: 50; position: fixed; left: 50%; top: 55%; transform: translate(-50%, -50%); text-align: center; }
    .center-logo { width: 140px; opacity: 0.3; filter: drop-shadow(0 0 20px var(--ui-blue)); }

    #statusbar {
      z-index: 400; position: fixed; bottom: 0; width: 100%;
      background: rgba(0,0,0,0.9); padding: 8px 20px; font-size: 9px;
      display: flex; justify-content: space-between; color: var(--ui-blue); border-top: 1px solid var(--ui-blue);
      text-transform: uppercase;
    }

    .close-btn { 
      display: block; width: 100%; padding: 15px; color: var(--ui-red); 
      text-align: center; cursor: pointer; font-weight: bold; letter-spacing: 5px;
      margin-top: 20px; border-top: 1px dashed var(--ui-red); transition: 0.3s;
    }
    .close-btn:hover { background: rgba(255,0,0,0.1); color: #fff; }

    /* SCROLLBAR */
    #panel::-webkit-scrollbar { width: 4px; }
    #panel::-webkit-scrollbar-thumb { background: var(--ui-red); }
  </style>
</head>
<body>

  <div id="bg-image"></div>
  <div id="glass-overlay"></div>

  <header id="header-console">
    <h1>VIBE WEB STUDIO // OS v.3</h1>
    <nav class="nav-horizontal">
      <div class="nav-item" id="btn1" onclick="openMod(1, 'MANIFEST')">MANIFEST</div>
      <div class="nav-item" id="btn2" onclick="openMod(2, 'GLIKPRO')">GLIKPRO</div>
      <div class="nav-item" id="btn3" onclick="openMod(3, 'PORTFOLIO')">PROJEKTY</div>
      <div class="nav-item" id="btn4" onclick="openMod(4, 'PROCES')">PROCES</div>
      <div class="nav-item" id="btn5" onclick="openMod(5, 'KONTAKT')">KONTAKT</div>
    </nav>
  </header>

  <div id="center-container">
    <img src="IMG_20260203_123501.png" alt="Logo" class="center-logo">
  </div>

  <div id="panel">
    <div id="p-text" class="tile-grid"></div>
    <div class="close-btn" onclick="closeMod()">[ ZAMKNIJ_SYSTEM ]</div>
  </div>

  <div id="statusbar">
    <div id="status-left">CORE: ONLINE // ENCRYPTION: ACTIVE // SHADOW_UI: LOADED</div>
    <div id="sys-time">00:00:00</div>
  </div>

  <script>
    // AGRESYWNA TREŚĆ SYSTEMOWA
    const content = {
      MANIFEST: `
        <div class="content-tile">
          <div class="tile-header">01 // DOKTRYNA VIBE</div>
          <p>Nie budujemy "stronek". Budujemy cyfrowy oręż. W świecie, gdzie liczą się milisekundy, dostarczamy rozwiązania, które miażdżą konkurencję swoją wydajnością. Każdy bit kodu jest optymalizowany pod kątem totalnej dominacji.</p>
        </div>
        <div class="content-tile" style="animation-delay: 0.1s">
          <div class="tile-header">02 // INŻYNIERIA PRZEWAGI</div>
          <p>Korzystasz z gotowców? Już przegrałeś. Nasze systemy .NET Core to czysta siła obliczeniowa. Eliminujemy wąskie gardła w Twoim biznesie, zastępując chaos precyzyjnym mechanizmem.</p>
        </div>
        <div class="content-tile" style="animation-delay: 0.2s">
          <div class="tile-header">03 // AQUILA AI: WYWIAD CYFROWY</div>
          <p>Implementujemy AI jako mózg operacyjny Twojej firmy. Llama 3.1 i GPT-4 w naszych rękach stają się narzędziami do analityki agresywnej i automatyzacji zysku.</p>
          <div class="sell-alert">STATUS: TYLKO DLA LIDERÓW RYNKU. NIE OBSŁUGUJEMY PROJEKTÓW BEZ POTENCJAŁU.</div>
        </div>
      `,

      GLIKPRO: `
        <div class="content-tile">
          <div class="tile-header">PROJEKT: GLIKPRO // PROTOKÓŁ ALPHA</div>
          <p>Medyczna precyzja, cyfrowa brutalność. Ekosystem mobilny, który przejmuje kontrolę nad danymi z szybkością natywnego kodu C#.</p>
        </div>
        <div class="content-tile" style="animation-delay: 0.1s">
          <div class="tile-header">PARAMETRY OPERACYJNE</div>
          <div class="stat-row"><span>MODEL AI:</span><span class="stat-val">AQUILA-X (LLAMA 3.1)</span></div>
          <div class="stat-row"><span>CZAS REAKCJI:</span><span class="stat-val">INSTANT (&lt;0.8s)</span></div>
          <div class="stat-row"><span>FRAME RATE:</span><span class="stat-val">120 FPS STABLE</span></div>
          <div class="stat-row"><span>FRAMEWORK:</span><span class="stat-val">.NET MAUI NATIVE</span></div>
        </div>
        <div class="content-tile" style="animation-delay: 0.2s">
          <div class="tile-header">WIZUALIZACJA SYSTEMU</div>
          <img src="1000015077.jpg" style="width:100%; border: 1px solid var(--ui-red); filter: grayscale(0.4) contrast(1.1);">
        </div>
      `,

      PORTFOLIO: `
        <div class="content-tile">
          <div class="tile-header">SYSTEM RWR // LOGISTYKA</div>
          <p>Bezlitosna ewidencja i raportowanie. System, który wymusza porządek w strukturach firmy. Zero wycieków, 100% kontroli.</p>
        </div>
        <div class="content-tile" style="animation-delay: 0.1s">
          <div class="tile-header">WEB PREMIUM: BARCZEWSKA</div>
          <p>Estetyka, która uderza. Wizytówka literacka zaprojektowana tak, by nie dawać wyboru – użytkownik musi wejść w interakcję.</p>
          <a href="https://progressorkit.github.io/pabarczewska.github.io/" target="_blank" style="color:var(--ui-red-glow); font-size:11px; text-decoration: none; font-weight: bold;">[ PENETRACJA_RYNKU > ]</a>
        </div>
        <div class="content-tile" style="animation-delay: 0.2s">
          <div class="tile-header">INFRASTRUKTURA: ZAWORSKI</div>
          <p>Maksymalny minimalizm. Interfejs ostry jak skalpel, skupiony na jednym celu: konwersji widza w klienta.</p>
          <a href="https://progressorkit.github.io/marekzaworski.github.io/" target="_blank" style="color:var(--ui-red-glow); font-size:11px; text-decoration: none; font-weight: bold;">[ SPRAWDŹ_STRUKTURĘ > ]</a>
        </div>
      `,

      PROCES: `
        <div class="content-tile">
          <div class="tile-header">FAZA 01: REKONESANS</div>
          <p>Analizujemy Twoje słabe punkty. Nie zadajemy zbędnych pytań – szukamy sposobu na najszybsze przejęcie rynku.</p>
        </div>
        <div class="content-tile" style="animation-delay: 0.1s">
          <div class="tile-header">FAZA 02: EGZEKUCJA</div>
          <p>Piszemy kod, który nie wybacza błędów. Architektura Native zostawia konkurencję w erze WordPressa.</p>
        </div>
        <div class="content-tile" style="animation-delay: 0.2s">
          <div class="tile-header">FAZA 03: DOMINACJA</div>
          <p>Wdrażamy system i monitorujemy go 24/7. Jeśli coś stoi na drodze Twojego sukcesu – usuwamy to programowo.</p>
          <div class="sell-alert" style="color: var(--ui-red-glow); border-color: var(--ui-red);">OSTRZEŻENIE: NASZE ROZWIĄZANIA SĄ AGRESYWNIE SKUTECZNE.</div>
        </div>
      `,

      KONTAKT: `
        <div class="content-tile" style="border-left: 5px solid var(--ui-red);">
          <div class="tile-header">RAPORTUJ PROJEKT</div>
          <p>Masz konkretny problem? Pisz. Nie marnuj czasu na zapytania bez specyfikacji.</p>
          <p style="margin-top:20px;">E-MAIL: <span style="color: var(--ui-red-glow); font-weight: bold;">progressorkit@gmail.com</span></p>
        </div>
        <div class="content-tile" style="animation-delay: 0.2s">
          <div class="tile-header">STREFA KODU</div>
          <p>Wszystkie silniki testowane w najcięższych warunkach.</p>
          <p style="margin-top:10px;">GITHUB: <a href="https://github.com/progressorkit" target="_blank" style="color:#fff;">/PROGRESSORKIT</a></p>
          <p style="margin-top:15px; color: var(--ui-blue-glow);">STATUS: GOTOWY DO DZIAŁAŃ O WYSOKIM PRIORYTECIE.</p>
        </div>
      `
    };

    // LOGIKA OPERACYJNA
    function openMod(id, key) {
      document.getElementById('center-container').style.opacity = "0.05";
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      const activeBtn = document.getElementById('btn' + id);
      if(activeBtn) activeBtn.classList.add('active');
      
      const panel = document.getElementById('panel');
      const pText = document.getElementById('p-text');
      
      pText.innerHTML = content[key];
      panel.classList.add('active');
      panel.scrollTop = 0;
    }

    function closeMod() {
      document.getElementById('panel').classList.remove('active');
      document.getElementById('center-container').style.opacity = "0.3";
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    }

    setInterval(() => { 
        const timeBox = document.getElementById('sys-time');
        if(timeBox) timeBox.innerText = new Date().toLocaleTimeString(); 
    }, 1000);
  </script>
</body>
</html>
