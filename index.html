<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vibe OS | Red Alert Pro</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #050000;
      font-family: 'Courier New', monospace;
      color: #ff0000;
    }

    /* TŁO */
    #bg-layer {
      position: fixed; inset: 0; z-index: 1;
      background-size: cover; background-position: center;
      background-image: url('./bg1.jpg');
      filter: brightness(0.4) contrast(1.3);
      transition: background-image 0.6s ease;
    }

    #bg-overlay {
      position: fixed; inset: 0; z-index: 2;
      background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.9) 100%);
      pointer-events: none;
    }

    /* HEADER */
    #top-header {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: 15px; z-index: 100; text-align: center;
      border-bottom: 1px solid rgba(255, 0, 0, 0.2);
      background: rgba(0,0,0,0.5);
    }
    #top-header h1 { font-size: 16px; letter-spacing: 5px; }

    /* NAWIGACJA - ZAWSZE PO PRAWEJ */
    .nav-container {
      position: fixed; right: 15px; top: 50%;
      transform: translateY(-50%);
      z-index: 2000; 
      display: flex; flex-direction: column; gap: 15px;
    }

    .btn {
      width: 50px; height: 50px;
      background: rgba(10, 0, 0, 0.9);
      border: 1px solid #ff0000;
      color: #ff0000;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; cursor: pointer;
      transition: 0.3s;
    }
    .btn.active { background: #ff0000; color: #000; box-shadow: 0 0 15px #ff0000; }

    /* PANEL - POPRAWKA SZEROKOŚCI */
    #panel {
      position: fixed; left: -110%; top: 60px;
      width: calc(100% - 85px); /* Miejsce na przyciski */
      height: calc(100vh - 110px);
      background: rgba(5, 0, 0, 0.95);
      border: 1px solid #ff0000;
      padding: 20px; z-index: 1500;
      transition: 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
      display: flex; flex-direction: column;
    }
    #panel.active { left: 10px; }

    #p-text {
      flex-grow: 1; overflow-y: auto;
      font-size: 13px; line-height: 1.8; /* Większa czytelność */
      color: #ccc; margin: 15px 0;
      word-break: break-all;
    }

    .close-btn {
      padding: 10px; border: 1px solid #ff0000;
      color: #ff0000; text-align: center; font-size: 10px;
      letter-spacing: 2px; cursor: pointer;
    }

    /* CENTER LOGO & CALL TO ACTION */
    #center-logo {
      position: fixed; left: 45%; top: 50%;
      transform: translate(-50%, -50%);
      z-index: 5; text-align: center;
    }
    #center-logo img { width: min(55vw, 240px); opacity: 0.8; }
    
    .cta-text {
      font-size: 9px; margin-top: 15px; letter-spacing: 2px;
      animation: pulse 2s infinite; color: #ff0000;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    /* STATUS BAR */
    #statusbar { 
      position: fixed; bottom: 0; width: 100%; 
      background: #000; color: #ff0000; 
      padding: 6px 15px; font-size: 9px; 
      z-index: 2100; border-top: 1px solid #330000;
      display: flex; justify-content: space-between;
    }

    /* PROJEKTY */
    .preview-card { border: 1px solid #440000; padding: 10px; margin-bottom: 15px; background: #0a0000; }
    .preview-frame { height: 110px; overflow: hidden; margin: 8px 0; border: 1px solid #222; }
    .preview-frame iframe { width: 1000px; height: 700px; transform: scale(0.25); transform-origin: 0 0; border: none; filter: grayscale(1); }
  </style>
</head>
<body>

  <header id="top-header">
    <h1>VIBE WEB STUDIO</h1>
  </header>

  <div id="bg-layer"></div>
  <div id="bg-overlay"></div>

  <div id="center-logo">
    <img src="./IMG_20260203_123501.png" alt="Logo">
    <div class="cta-text">[ INITIALIZE_SYSTEM_VIA_01-04 ]</div>
  </div>

  <div class="nav-container">
    <div class="btn" id="btn1" onclick="openMod(1, './bg1.jpg', 'KIM_JESTEM', txt1, false)">01</div>
    <div class="btn" id="btn2" onclick="openMod(2, './bg2.jpg', 'CO_ROBIĘ', txt2, false)">02</div>
    <div class="btn" id="btn3" onclick="openMod(3, './bg3.jpg', 'PROJEKTY', txt3, true)">03</div>
    <div class="btn" id="btn4" onclick="openMod(4, './bg4.jpg', 'KONTAKT', txt4, false)">04</div>
  </div>

  <div id="panel">
    <div id="p-title" style="font-size: 18px; border-bottom: 1px solid #ff0000;"></div>
    <div id="p-text"></div>
    <div class="close-btn" onclick="closeMod()">[ TERMINATE_SESSION ]</div>
  </div>

  <div id="statusbar">
    <div id="sys-log">SYS_READY</div>
    <div id="sys-time">00:00:00</div>
  </div>

  <script>
    let timer = null;

    const txt1 = `[PROFILE] Kim jestem\n\nProjektuję i buduję strony oraz systemy treści, które działają stabilnie – nie tylko wyglądają.\n\nŁączę estetykę z logiką:\n• czytelność i struktura\n• spójny klimat\n• modułowa budowa\n• gotowe wdrożenie`;
    const txt2 = `[OFFER] Co mogę zrobić\n\n• strony portfolio i autorskie\n• strony usługowe pod sprzedaż\n• systemy tekstów i publikacji\n• wdrożenia GitHub / Netlify`;
    const txt3 = `<div>[PROOFS] Wybrane projekty:</div>
      <div class="preview-card">
        <strong>M. ZAWORSKI</strong>
        <div class="preview-frame"><iframe src="https://progressorkit.github.io/marekzaworski.github.io/"></iframe></div>
        <a href="https://progressorkit.github.io/marekzaworski.github.io/" target="_blank" style="color:#ff0000; font-size:11px;">[ VIEW_LIVE ]</a>
      </div>
      <div class="preview-card">
        <strong>P. BARCZEWSKA</strong>
        <div class="preview-frame"><iframe src="https://pbarczewska.github.io/"></iframe></div>
        <a href="https://pbarczewska.github.io/" target="_blank" style="color:#ff0000; font-size:11px;">[ VIEW_LIVE ]</a>
      </div>`;
    const txt4 = `[CONTACT] Kontakt\n\nEmail: progresskit7@gmail.com\n\nStatus: Awaiting parameters...`;

    function openMod(id, img, title, content, isHtml) {
      document.getElementById('bg-layer').style.backgroundImage = `url('${img}')`;
      document.getElementById('p-title').innerText = "> " + title;
      const pText = document.getElementById('p-text');
      
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn'+id).classList.add('active');

      if (timer) clearInterval(timer);
      if (isHtml) { pText.innerHTML = content; } 
      else {
        pText.textContent = "";
        let i = 0;
        timer = setInterval(() => {
          if (i < content.length) { pText.textContent += content[i++]; }
          else { clearInterval(timer); }
        }, 15);
      }
      document.getElementById('panel').classList.add('active');
      document.getElementById('sys-log').innerText = `DATA_STREAM_0${id}_ACTIVE`;
    }

    function closeMod() {
      if (timer) clearInterval(timer);
      document.getElementById('panel').classList.remove('active');
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      document.getElementById('sys-log').innerText = "SYS_STANDBY";
    }

    setInterval(() => {
      document.getElementById('sys-time').innerText = new Date().toLocaleTimeString();
    }, 1000);
  </script>
</body>
</html>
