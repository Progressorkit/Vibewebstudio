<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vibe Web Studio</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --main-ui: #0077ff;
      --glow-ui: #00aaff;
      --header-red: #ff0000;
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #000; font-family: 'Courier New', monospace; color: #fff;
    }

    /* TŁO - pointer-events: none gwarantuje, że nie zablokuje kliknięć */
    #bg-image { position: fixed; inset: 0; background: url('zdjtlo.png') no-repeat center center; background-size: cover; z-index: 1; pointer-events: none; }
    #glass-overlay { position: fixed; inset: 0; z-index: 2; background: rgba(0, 0, 0, 0.4); pointer-events: none; }

    /* CUSTOM SCROLLBAR */
    #panel::-webkit-scrollbar { width: 6px; }
    #panel::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    #panel::-webkit-scrollbar-thumb { background: var(--main-ui); border-radius: 10px; }

    /* HEADER & NAV - z-index: 200 dla absolutnej pewności */
    #header-console {
      top: 0; left: 0; width: 100%; z-index: 200; position: fixed;
      background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--main-ui);
      padding: 20px 10px; text-align: center;
    }

    #header-console h1 {
      color: var(--header-red); font-size: 24px; letter-spacing: 10px; font-weight: 900;
      text-shadow: 0 0 15px rgba(255,0,0,0.6); margin-bottom: 15px;
    }

    .nav-horizontal { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    
    .nav-item {
      padding: 10px 15px; font-size: 11px; font-weight: 900; cursor: pointer;
      border: 2px solid var(--main-ui); background: rgba(0, 119, 255, 0.1);
      color: #fff; transition: all 0.3s ease; letter-spacing: 1px;
      user-select: none;
    }

    .nav-item:hover { background: rgba(0, 119, 255, 0.3); box-shadow: 0 0 15px var(--glow-ui); }
    .nav-item.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 20px #fff; }

    /* PANEL */
    #panel {
      z-index: 300; position: fixed; top: 120%; left: 50%;
      transform: translateX(-50%); width: 95%; max-width: 1100px;
      height: 70vh; 
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--main-ui);
      padding: 30px; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
      overflow-y: auto; opacity: 0; visibility: hidden;
    }
    #panel.active { top: 160px; opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

    .section-title { color: var(--glow-ui); font-size: 18px; margin: 25px 0 10px; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid rgba(0,170,255,0.2); }
    .sell-highlight { color: #fff; border-left: 3px solid var(--header-red); padding: 10px 15px; margin: 20px 0; font-style: italic; background: rgba(255,0,0,0.1); }
    
    .tech-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
    .tech-table th, .tech-table td { border: 1px solid rgba(0, 119, 255, 0.3); padding: 10px; text-align: left; font-size: 12px; }
    
    .project-link { display: inline-block; margin-top: 10px; color: var(--glow-ui); text-decoration: none; font-weight: bold; border: 1px solid var(--glow-ui); padding: 5px 10px; }

    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 20px; }
    .gallery-item { border: 1px solid rgba(255,255,255,0.1); background: #000; line-height: 0; }
    .gallery-item img { width: 100%; height: auto; }

    #center-container { z-index: 50; position: fixed; left: 50%; top: 55%; transform: translate(-50%, -50%); text-align: center; transition: 0.5s; }
    .center-logo { width: 150px; opacity: 0.5; }

    #statusbar {
      z-index: 400; position: fixed; bottom: 0; width: 100%;
      background: #000; padding: 10px 20px; font-size: 10px;
      display: flex; justify-content: space-between; color: var(--main-ui); border-top: 1px solid var(--main-ui);
    }
  </style>
</head>
<body>

  <div id="bg-image"></div>
  <div id="glass-overlay"></div>

  <header id="header-console">
    <h1>VIBE WEB STUDIO</h1>
    <nav class="nav-horizontal">
      <div class="nav-item" id="btn1" onclick="openMod(1, 'MANIFEST')">⚡ MANIFEST</div>
      <div class="nav-item" id="btn2" onclick="openMod(2, 'GLIKPRO')">🦅 GLIKPRO</div>
      <div class="nav-item" id="btn3" onclick="openMod(3, 'PORTFOLIO')">📊 PROJEKTY</div>
      <div class="nav-item" id="btn4" onclick="openMod(4, 'PROCES')">🚀 PROCES</div>
      <div class="nav-item" id="btn5" onclick="openMod(5, 'KONTAKT')">📧 KONTAKT</div>
    </nav>
  </header>

  <div id="center-container">
    <img src="IMG_20260203_123501.png" alt="Logo" class="center-logo">
  </div>

  <div id="panel">
    <div id="p-text"></div>
    <div style="margin-top: 50px; color: #ff0000; cursor: pointer; text-align: center; font-weight: bold;" onclick="closeMod()">[ ZAMKNIJ_SYSTEM ]</div>
  </div>

  <div id="statusbar">
    <div>SYSTEM_STATUS: ACTIVE // VIBE_OS: v3.0</div>
    <div id="sys-time">00:00:00</div>
  </div>

  <script>
    const content = {
      MANIFEST: `
        <div class="section-title">🦅 VIBE WEB STUDIO: ARCHITEKTURA DOMINACJI</div>
        <div class="sell-highlight">Nie budujemy "stronek". Tworzymy cyfrowe ekosystemy, które pracują na Twój sukces. Naszym fundamentem jest czysty kod, natywna wydajność i AI, która wyprzedza rynek.</div>
        <p><strong>1. Systemy Biznesowe:</strong> Dedykowane rozwiązania ERP/CRM w .NET Core.</p>
        <p style="margin-top:10px;"><strong>2. Mobile:</strong> Natywne aplikacje .NET MAUI (120 FPS, zero lagów).</p>
        <p style="margin-top:10px;"><strong>3. High-End Web:</strong> FastAPI + React. Zapomnij o wolnym WordPressie.</p>
        <p style="margin-top:10px;"><strong>4. AquilaAI:</strong> Integracja z Llama 3.1 i GPT-4 dla Twojego biznesu.</p>
      `,

      GLIKPRO: `
        <div class="section-title">🦅 GLIKPRO: EKOSYSTEM PRECYZJI</div>
        <p>Natywny, pancerny ekosystem mobilny stworzony w .NET MAUI. Silnik AquilaAI zapewnia analizę danych w ułamku sekundy.</p>
        <table class="tech-table">
          <tr><th>Funkcja</th><th>Opis</th><th>Szybkość</th></tr>
          <tr><td>Analiza AI</td><td>Groq LPU (Llama 3.1)</td><td>&lt; 1s</td></tr>
          <tr><td>Performance</td><td>Natywny kod C#</td><td>120 FPS</td></tr>
        </table>
        <div class="gallery-grid">
          <div class="gallery-item"><img src="1000015077.jpg"></div>
          <div class="gallery-item"><img src="1000015076.jpg"></div>
        </div>
      `,

      PORTFOLIO: `
        <div class="section-title">📊 WYBRANE REALIZACJE</div>
        <p><strong>SYSTEM RWR:</strong> Ewidencja i raportowanie PDF.</p>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="rwr1.png"></div>
            <div class="gallery-item"><img src="rwr2.png"></div>
        </div>
        <div class="section-title">WEB PREMIUM</div>
        <p>P.A. BARCZEWSKA - Autorska wizytówka literacka.</p>
        <a href="https://progressorkit.github.io/pabarczewska.github.io/" target="_blank" class="project-link">OTWÓRZ ></a>
      `,

      PROCES: `
        <div class="section-title">🚀 STRATEGIA WDROŻENIA</div>
        <div class="sell-highlight">"Większość agencji sprzedaje obrazki. My sprzedajemy technologię."</div>
        <ul>
          <li><strong>01:</strong> Analiza agresywna rynku.</li>
          <li><strong>02:</strong> Architektura Native (Zero Bloat).</li>
          <li><strong>03:</strong> Implementacja AI (AquilaAI Core).</li>
          <li><strong>04:</strong> Hosting i wsparcie 24/7.</li>
        </ul>
      `,

      KONTAKT: `
        <div class="section-title">📡 PROTOKÓŁ KOMUNIKACJI</div>
        <div class="sell-highlight">"Szukamy partnerów do budowania cyfrowej przyszłości. Pisz konkretnie."</div>
        <p><strong>E-MAIL:</strong> <span style="color: var(--glow-ui);">progressorkit@gmail.com</span></p>
        <p style="margin-top:15px;"><strong>GITHUB:</strong> <a href="https://github.com/progressorkit" target="_blank" style="color:#fff;">github.com/progressorkit</a></p>
        <p style="margin-top:15px;"><strong>STATUS:</strong> Dostępny dla nowych systemów.</p>
      `
    };

    function openMod(id, key) {
      console.log("Inicjalizacja modułu:", key); // Debug w konsoli (F12)
      
      // Ukryj logo w tle
      document.getElementById('center-container').style.opacity = "0.05";
      
      // Reset przycisków
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      
      // Aktywuj wybrany
      const activeBtn = document.getElementById('btn' + id);
      if(activeBtn) activeBtn.classList.add('active');
      
      // Wstrzyknij treść i pokaż panel
      const panel = document.getElementById('panel');
      const pText = document.getElementById('p-text');
      
      if(panel && pText) {
        pText.innerHTML = content[key];
        panel.classList.add('active');
        panel.scrollTop = 0;
      }
    }

    function closeMod() {
      const panel = document.getElementById('panel');
      if(panel) panel.classList.remove('active');
      
      document.getElementById('center-container').style.opacity = "0.5";
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    }

    // Zegar systemowy
    setInterval(() => { 
        const timeBox = document.getElementById('sys-time');
        if(timeBox) timeBox.innerText = new Date().toLocaleTimeString(); 
    }, 1000);
  </script>
</body>
</html>
