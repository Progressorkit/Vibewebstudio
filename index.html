<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vibe OS | Pro</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --main-ui: #003366; 
      --glow-ui: #0077ff; 
      --header-red: #ff0000;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000; /* To widać, jeśli zdjęcie się nie wczyta */
      font-family: 'Courier New', monospace;
    }

    /* TŁO - BEZ ŻADNEGO PRZYCIEMNIANIA */
    #bg-image {
      position: fixed; inset: 0;
      background: url('./File_000000007f9c720ab829b9d20e358f6d.png') no-repeat center center;
      background-size: cover;
      z-index: 1;
    }

    /* TYLKO LEKKIE ROZMYCIE (SZKŁO) */
    #glass-overlay {
      position: fixed; inset: 0;
      z-index: 2;
      background: rgba(0, 0, 0, 0.2); /* Bardzo słaby cień, żeby teksty były czytelne */
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    header, #center-container, #panel, #statusbar { z-index: 100; position: fixed; }

    #header-console {
      top: 0; left: 0; width: 100%;
      background: rgba(0,2,10,0.85);
      border-bottom: 2px solid var(--main-ui);
      padding: 15px 10px;
    }

    #header-console h1 {
      color: var(--header-red);
      font-size: 19px; text-align: center; letter-spacing: 5px;
      text-shadow: 0 0 10px rgba(255,0,0,0.7);
    }
    
    .nav-instruction {
      font-size: 8px; text-align: center; color: #fff;
      letter-spacing: 2px; margin-top: 8px; opacity: 0.8;
      text-transform: uppercase;
    }

    .nav-horizontal { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }

    /* MOCNE PULSOWANIE PRZYCISKÓW */
    @keyframes glowPulse {
      0% { box-shadow: 0 0 5px var(--glow-ui); border-color: var(--main-ui); }
      50% { box-shadow: 0 0 20px var(--glow-ui); border-color: var(--glow-ui); }
      100% { box-shadow: 0 0 5px var(--glow-ui); border-color: var(--main-ui); }
    }

    .nav-item {
      padding: 12px 15px; font-size: 11px; font-weight: bold;
      cursor: pointer; border: 1px solid var(--main-ui);
      background: rgba(0, 30, 60, 0.8); color: var(--glow-ui);
      animation: glowPulse 2s infinite ease-in-out;
      transition: all 0.3s;
    }

    /* PO KLIKNIĘCIU ŚWIECI CAŁY CZAS NA NIEBIESKO */
    .nav-item.active { 
      background: var(--glow-ui); 
      color: #fff;
      box-shadow: 0 0 30px var(--glow-ui) !important;
      border-color: #fff !important;
      animation: none; 
    }

    #center-container {
      left: 50%; top: 55%; transform: translate(-50%, -50%);
      text-align: center; transition: 0.5s;
    }

    /* KONTAKT - OTWIERA MAILA */
    .quick-contact {
      display: inline-block; margin-top: 25px; padding: 15px 25px;
      border: 1px solid var(--glow-ui); color: #fff;
      text-decoration: none; font-size: 12px; letter-spacing: 2px;
      background: rgba(0, 119, 255, 0.2);
      transition: 0.3s;
    }
    .quick-contact:hover {
      background: var(--glow-ui); box-shadow: 0 0 20px var(--glow-ui);
    }

    #panel {
      top: -100%; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 600px; height: 60vh;
      background: rgba(0, 5, 15, 0.95);
      border: 2px solid var(--glow-ui);
      padding: 30px; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }

    #panel.active { top: 180px; }

    #p-text { color: #fff; line-height: 1.8; font-size: 14px; overflow-y: auto; height: 80%; }

    #statusbar { 
      bottom: 0; width: 100%; background: #000; 
      padding: 10px 15px; font-size: 10px; display: flex; 
      justify-content: space-between; color: var(--glow-ui);
      border-top: 1px solid var(--main-ui);
    }
  </style>
</head>
<body>

  <div id="bg-image"></div>
  <div id="glass-overlay"></div>

  <header id="header-console">
    <h1>VIBE WEB STUDIO</h1>
    <div class="nav-instruction">[ WYBIERZ MODUŁ DANYCH ]</div>
    <nav class="nav-horizontal">
      <div class="nav-item" id="btn1" onclick="openMod(1, txt1, false)">BIO</div>
      <div class="nav-item" id="btn2" onclick="openMod(2, txt2, false)">TASK</div>
      <div class="nav-item" id="btn3" onclick="openMod(3, txt3, true)">WORK</div>
    </nav>
  </header>

  <div id="center-container">
    <img src="./IMG_20260203_123501.png" alt="Logo" style="width:220px;">
    <br>
    <a href="mailto:progresskit7@gmail.com" class="quick-contact">[ ZAINICJUJ KONTAKT ]</a>
  </div>

  <div id="panel">
    <div id="p-text"></div>
    <div onclick="closeMod()" style="margin-top:20px; color:var(--glow-ui); cursor:pointer; text-align:center; font-weight:bold;">[ ZAMKNIJ MODUŁ ]</div>
  </div>

  <div id="statusbar">
    <div id="sys-log">SYSTEM_ONLINE</div>
    <div id="sys-time">00:00:00</div>
  </div>

  <script>
    let timer = null;
    
    // Zaktualizowane teksty zgodnie z Twoimi wytycznymi
    const txt1 = "PROFESJONALIZM BEZ KOMPROMISÓW.<br><br>Buduję strony internetowe od zera, opierając się wyłącznie na Twoim pomyśle i autorskim kodzie. Nie uznaję gotowych szablonów ani rozwiązań masowych.<br><br>Stosuję niekonwencjonalne podejście do interfejsu (UI/UX), dostarczając projekty, które wyróżniają się w sieci i budują silny wizerunek marki.";
    
    const txt2 = "• Dedykowane Wizytówki i Portfolio<br>• Systemy zarządzania treścią<br>• Zaawansowane animacje UI<br><br><span style='color:#0077ff'>[ INFO ] Każdy projekt jest szyty na miarę. Nie ma dwóch takich samych stron.</span>";
    
    const txt3 = "<strong>M. ZAWORSKI</strong><br><small>System publikacji / Narracja</small><br><a href='#' style='color:#0077ff; text-decoration:none;'>>> OTWÓRZ PROJEKT</a><br><br><strong>P. BARCZEWSKA</strong><br><small>Portfolio autorskie</small><br><a href='#' style='color:#0077ff; text-decoration:none;'>>> OTWÓRZ PROJEKT</a>";

    function openMod(id, content, isHtml) {
      document.getElementById('center-container').style.opacity = "0.05";
      const pText = document.getElementById('p-text');
      
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('btn'+id).classList.add('active');
      
      if(timer) clearInterval(timer);
      pText.innerHTML = "";

      if(isHtml || content.includes('<br>')) {
        pText.innerHTML = content;
      } else {
        let i = 0;
        timer = setInterval(() => {
          if (i < content.length) pText.innerHTML += content[i++];
          else clearInterval(timer);
        }, 15);
      }
      document.getElementById('panel').classList.add('active');
    }

    function closeMod() {
      if(timer) clearInterval(timer);
      document.getElementById('panel').classList.remove('active');
      document.getElementById('center-container').style.opacity = "1";
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    }

    setInterval(() => { document.getElementById('sys-time').innerText = new Date().toLocaleTimeString(); }, 1000);
  </script>
</body>
</html>
