<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vibe Web Studio | Autorskie Strony Premium</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --main-ui: #003366; 
      --glow-ui: #0077ff; 
      --header-red: #ff0000;
      --text-gray: #b0b0b0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
      color: #fff;
    }

    /* TŁO */
    #bg-image {
      position: fixed;
      inset: 0;
      background: url('zdjtlo.png') no-repeat center center;
      background-size: cover;
      z-index: 1;
    }

    #glass-overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: rgba(0, 4, 12, 0.55);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    header, #center-container, #panel, #statusbar {
      z-index: 100;
      position: fixed;
    }

    /* HEADER & CLAIM */
    #header-console {
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0,0,0,0.85);
      border-bottom: 1px solid var(--main-ui);
      padding: 20px 10px;
      text-align: center;
    }

    #header-console h1 {
      color: var(--header-red);
      font-size: 18px;
      letter-spacing: 6px;
      font-weight: 900;
      text-shadow: 0 0 10px rgba(255,0,0,0.5);
    }

    .sub-claim {
      font-size: 9px;
      color: var(--text-gray);
      margin-top: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* NAV */
    .nav-horizontal {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 15px;
    }

    .nav-item {
      padding: 10px 16px;
      font-size: 10px;
      font-weight: bold;
      cursor: pointer;
      border: 1px solid var(--main-ui);
      background: rgba(0, 30, 60, 0.3);
      color: var(--glow-ui);
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .nav-item:hover {
      background: rgba(0, 119, 255, 0.2);
      box-shadow: 0 0 15px var(--glow-ui);
    }

    .nav-item.active { 
      background: var(--glow-ui);
      color: #fff;
      box-shadow: 0 0 25px var(--glow-ui);
      border-color: #fff;
    }

    /* CENTER CONTAINER */
    #center-container {
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      text-align: center;
      transition: 0.5s;
      width: 100%;
    }

    .main-cta {
      display: inline-block;
      margin-top: 30px;
      padding: 18px 35px;
      border: 1px solid #fff;
      color: #fff;
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 3px;
      background: rgba(255, 255, 255, 0.05);
      transition: 0.3s;
      font-weight: bold;
    }

    .main-cta:hover {
      background: #fff;
      color: #000;
      box-shadow: 0 0 30px #fff;
    }

    /* PANEL - PRECYZJA PREMIUM */
    #panel {
      top: 110%;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 500px;
      max-height: 60vh;
      background: rgba(0, 8, 20, 0.95);
      border: 1px solid var(--glow-ui);
      padding: 25px;
      transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
      overflow-y: auto;
      opacity: 0;
    }

    #panel.active {
      top: 160px;
      opacity: 1;
    }

    .panel-header { 
      font-size: 11px;
      color: var(--glow-ui);
      margin-bottom: 20px;
      letter-spacing: 2px;
      border-bottom: 1px solid rgba(0, 119, 255, 0.3);
      padding-bottom: 5px;
    }

    #p-text {
      color: #eee;
      line-height: 1.5;
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    .work-item {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .work-title {
      color: var(--glow-ui);
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .work-desc {
      font-size: 12px;
      color: #ccc;
      margin-bottom: 8px;
    }

    .work-link {
      color: #fff;
      text-decoration: none;
      font-size: 10px;
      border: 1px solid #444;
      padding: 4px 8px;
      transition: 0.3s;
    }

    .work-link:hover {
      border-color: var(--glow-ui);
      color: var(--glow-ui);
    }

    .close-btn { 
      margin-top: 20px;
      color: #666;
      cursor: pointer;
      text-align: center;
      font-size: 10px;
      letter-spacing: 2px;
    }

    .close-btn:hover {
      color: var(--glow-ui);
    }

    /* FOOTER */
    #statusbar { 
      bottom: 0;
      width: 100%;
      background: #000;
      padding: 12px 20px;
      font-size: 9px;
      display: flex;
      justify-content: space-between;
      color: var(--glow-ui);
      border-top: 1px solid var(--main-ui);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div id="bg-image"></div>
  <div id="glass-overlay"></div>

  <header id="header-console">
    <h1>VIBE WEB STUDIO</h1>
    <div class="sub-claim">Autorskie strony i interfejsy bez szablonów</div>
    <nav class="nav-horizontal">
      <div class="nav-item" id="btn1" onclick="openMod(1, 'BIO')">BIO</div>
      <div class="nav-item" id="btn2" onclick="openMod(2, 'PROCES')">PROCES</div>
      <div class="nav-item" id="btn3" onclick="openMod(3, 'WORK')">PROJEKTY</div>
    </nav>
  </header>

  <div id="center-container">
    <img src="IMG_20260203_123501.png" alt="Logo" style="width:180px; margin-bottom: 10px;">
    <br>
    <a href="mailto:progresskit7@gmail.com" class="main-cta">[ ROZPOCZNIJ PROJEKT ]</a>
  </div>

  <div id="panel">
    <div id="p-header" class="panel-header">MODUŁ_DANYCH</div>
    <div id="p-text"></div>
    <div class="close-btn" onclick="closeMod()">[ ZAMKNIJ_SYSTEM ]</div>
  </div>

  <div id="statusbar">
    <div>RESPONSE_MODE_ACTIVE // CUSTOM_UI_READY</div>
    <div id="sys-time">00:00:00</div>
  </div>

  <script>
    const content = {
      BIO: `Projektuję i wdrażam autorskie strony internetowe dla marek osobistych i twórców, którzy nie chcą wyglądać jak reszta.<br><br>Każdy interfejs powstaje od zera — bez szablonów, bez gotowców, bez kompromisów technicznych. Łączę surowy, nowoczesny design z precyzyjnym celem sprzedażowym.`,
      
      PROCES: `01 // ANALIZA<br>Definiujemy cel strony, architekturę treści i kierunek wizualny.<br><br>02 // PROJEKT INTERFEJSU<br>Tworzę autorski projekt od czystej kartki, dopasowany do charakteru marki.<br><br>03 // WDROŻENIE<br>Budowa responsywnego systemu, optymalizacja prędkości i SEO.<br><br>04 // PUBLIKACJA<br>Testy końcowe, wdrożenie na serwer i oddanie gotowego narzędzia.`,
      
      WORK: `
        <div class="work-item">
          <div class="work-title">M. ZAWORSKI</div>
          <div class="work-desc">Strona noir dla pisarza. Cel: Budowa marki i sprzedaż książki poza platformami marketplace.</div>
          <a href="https://progressorkit.github.io/marekzaworski.github.io/" target="_blank" rel="noopener noreferrer" class="work-link">ZOBACZ REALIZACJĘ</a>
        </div>
        <div class="work-item">
          <div class="work-title">P. BARCZEWSKA</div>
          <div class="work-desc">Minimalistyczne portfolio wizerunkowe z naciskiem na emocjonalny ton komunikacji.</div>
          <a href="https://pbarczewska.github.io/" target="_blank" rel="noopener noreferrer" class="work-link">ZOBACZ REALIZACJĘ</a>
        </div>
      `
    };

    function openMod(id, key) {
      document.getElementById('center-container').style.opacity = "0.05";
      const pText = document.getElementById('p-text');
      const pHeader = document.getElementById('p-header');

      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('btn' + id).classList.add('active');

      pHeader.innerText = `MODUŁ_${key}`;
      pText.innerHTML = content[key];

      document.getElementById('panel').classList.add('active');
    }

    function closeMod() {
      document.getElementById('panel').classList.remove('active');
      document.getElementById('center-container').style.opacity = "1";
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    }

    setInterval(() => {
      document.getElementById('sys-time').innerText = new Date().toLocaleTimeString();
    }, 1000);
  </script>
</body>
</html>
