<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vibe OS | Deep Navy Edition</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* KOLORYSTYKA */
    :root {
      --main-ui: #003366; /* Głęboki granat */
      --glow-ui: #0055aa; 
      --header-red: #ff0000;
      --text-main: #ffffff;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #00050a;
      font-family: 'Courier New', monospace;
      color: var(--main-ui);
    }

    /* SIATKA TŁA */
    body::before {
      content: ""; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0, 51, 102, 0.15) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 51, 102, 0.15) 1px, transparent 1px);
      background-size: 35px 35px;
      z-index: 2; pointer-events: none;
    }

    #bg-layer {
      position: fixed; inset: 0; z-index: 1;
      background-size: cover; background-position: center;
      filter: brightness(0.2) saturate(0.5);
      transition: 1.5s ease;
    }

    /* NAGŁÓWEK - CZERWONY */
    #header-console {
      position: fixed; top: 0; left: 0; width: 100%;
      z-index: 2000; background: rgba(0,2,10,0.95);
      border-bottom: 2px solid var(--main-ui);
      padding: 15px 10px;
    }

    #header-console h1 {
      color: var(--header-red);
      font-size: 19px; text-align: center; letter-spacing: 5px;
      margin-bottom: 12px; text-shadow: 0 0 15px rgba(255,0,0,0.6);
    }

    .nav-instruction {
      font-size: 9px; text-align: center; color: var(--text-main);
      letter-spacing: 1px; margin-bottom: 15px; opacity: 0.6;
    }

    /* PRZYCISKI Z PULSOWANIEM */
    .nav-horizontal {
      display: flex; justify-content: center; gap: 10px;
    }

    @keyframes pulse-navy {
      0% { box-shadow: 0 0 5px var(--main-ui); border-color: var(--main-ui); }
      50% { box-shadow: 0 0 15px var(--glow-ui); border-color: var(--glow-ui); }
      100% { box-shadow: 0 0 5px var(--main-ui); border-color: var(--main-ui); }
    }

    .nav-item {
      padding: 12px 15px; font-size: 11px; font-weight: bold;
      cursor: pointer; border: 1px solid var(--main-ui);
      background: rgba(0, 51, 102, 0.1); color: var(--main-ui);
      animation: pulse-navy 3s infinite ease-in-out;
    }

    .nav-item.active { 
      background: var(--main-ui); color: #fff;
      animation: none; box-shadow: 0 0 20px var(--glow-ui);
    }

    /* SEKCJA LOGO I SZYBKI KONTAKT */
    #center-container {
      position: fixed; left: 50%; top: 55%;
      transform: translate(-50%, -50%);
      z-index: 5; text-align: center;
      transition: 0.5s;
    }

    #center-container img { width: 260px; margin-bottom: 20px; }

    .quick-contact {
      display: inline-block;
      padding: 10px 20px;
      border: 1px solid var(--main-ui);
      color: var(--text-main);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
      background: rgba(0, 51, 102, 0.2);
      transition: 0.3s;
    }
    .quick-contact:hover { background: var(--main-ui); }

    /* PANEL TREŚCI */
    #panel {
      position: fixed; top: -100%; left: 50%;
      transform: translateX(-50%);
      width: 95%; max-width: 650px;
      height: 70vh;
      background: rgba(0, 5, 15, 0.98);
      border: 1px solid var(--main-ui);
      padding: 25px; z-index: 1500;
      transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
      display: flex; flex-direction: column;
      box-shadow: 0 0 50px #000;
    }

    #panel.active { top: 150px; }

    #p-title {
      font-size: 18px; color: var(--main-ui);
      border-bottom: 1px solid var(--main-ui);
      padding-bottom: 10px; font-weight: bold;
    }

    #p-text {
      flex-grow: 1; overflow-y: auto;
      font-size: 16px; line-height: 1.7;
      color: var(--text-main); margin-top: 20px;
    }

    .portfolio-item {
      border-left: 3px solid var(--main-ui);
      padding: 15px; margin-bottom: 20px;
      background: rgba(0, 51, 102, 0.1);
    }
    .portfolio-link {
      display: inline-block; margin-top: 10px;
      color: #fff; background: var(--main-ui);
      padding: 8px 15px; text-decoration: none; font-size: 12px;
    }

    .close-area {
      margin-top: 20px; padding: 15px;
      border: 1px solid var(--main-ui);
      text-align: center; font-size: 12px;
      cursor: pointer; color: var(--main-ui);
    }

    #statusbar { 
      position: fixed; bottom: 0; width: 100%; 
      background: #000; border-top: 1px solid var(--main-ui);
      padding: 10px 15px; font-size: 11px; z-index: 2100;
      display: flex; justify-content: space-between;
      color: var(--main-ui);
    }
  </style>
</head>
<body>

  <div id="bg-layer"></div>

  <header id="header-console">
    <h1>VIBE WEB STUDIO</h1>
    <div class="nav-instruction">WYBIERZ MODUŁ DANYCH</div>
    <nav class="nav-horizontal">
      <div class="nav-item" id="btn1" onclick="openMod(1, 'IDENTYFIKACJA', txt1, false)">BIO</div>
      <div class="nav-item" id="btn2" onclick="openMod(2, 'OFERTA', txt2, false)">TASK</div>
      <div class="nav-item" id="btn3" onclick="openMod(3, 'PROJEKTY', txt3, true)">WORK</div>
    </nav>
  </header>

  <div id="center-container">
    <img src="./IMG_20260203_123501.png" alt="Logo">
    <br>
    <a href="mailto:progresskit7@gmail.com" class="quick-contact">[ ZAINICJUJ KONTAKT ]</a>
  </div>

  <div id="panel">
    <div id="p-title"></div>
    <div id="p-text"></div>
    <div class="close-area" onclick="closeMod()">[ POWRÓT DO KONSOLI ]</div>
  </div>

  <div id="statusbar">
    <div id="sys-log">ENCRYPTED_LINK_ESTABLISHED</div>
    <div id="sys-time">00:00:00</div>
  </div>

  <script>
    let timer = null;

    const txt1 = `Buduję interfejsy, które nie tylko wyglądają, ale pracują na Twój wynik. Surowa estetyka, zero zbędnych elementów, czysta logika kodu.`;
    const txt2 = `• Tworzenie unikalnych wizytówek www\n• Systemy portfolio dla artystów\n• Optymalizacja UI/UX\n• Wdrożenia na darmowe hostingi (GitHub/Netlify)`;
    
    const txt3 = `
      <div class="portfolio-item">
        <strong>M. ZAWORSKI</strong><br><small>Narracja / System publikacji</small><br>
        <a href="https://progressorkit.github.io/marekzaworski.github.io/" target="_blank" class="portfolio-link">OTWÓRZ PROJEKT</a>
      </div>
      <div class="portfolio-item">
        <strong>P. BARCZEWSKA</strong><br><small>Portfolio literackie</small><br>
        <a href="https://pbarczewska.github.io/" target="_blank" class="portfolio-link">OTWÓRZ PROJEKT</a>
      </div>`;

    function openMod(id, title, content, isHtml) {
      document.getElementById('center-container').style.opacity = "0.1";
      document.getElementById('p-title').innerText = "> " + title;
      const pText = document.getElementById('p-text');
      
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('btn'+id).classList.add('active');

      if (timer) clearInterval(timer);

      if (isHtml) { 
        pText.innerHTML = content; 
      } else {
        pText.innerHTML = "";
        let i = 0;
        timer = setInterval(() => {
          if (i < content.length) { pText.innerHTML += content[i++]; }
          else { clearInterval(timer); }
        }, 15);
      }
      document.getElementById('panel').classList.add('active');
    }

    function closeMod() {
      if (timer) clearInterval(timer);
      document.getElementById('panel').classList.remove('active');
      document.getElementById('center-container').style.opacity = "1";
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    }

    setInterval(() => {
      document.getElementById('sys-time').innerText = new Date().toLocaleTimeString();
    }, 1000);
  </script>
</body>
</html>
