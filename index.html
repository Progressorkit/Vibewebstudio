<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vibe Web Studio | Native Systems</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --main-ui: #0077ff;
      --glow-ui: #00aaff;
      --header-red: #ff0000;
      --panel-bg: rgba(0, 10, 25, 0.98);
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #000; font-family: 'Courier New', monospace; color: #fff;
    }

    #bg-image { position: fixed; inset: 0; background: url('zdjtlo.png') no-repeat center center; background-size: cover; z-index: 1; }
    #glass-overlay { position: fixed; inset: 0; z-index: 2; background: rgba(0, 5, 15, 0.75); backdrop-filter: blur(10px); }

    /* HEADER & NAV */
    #header-console {
      top: 0; left: 0; width: 100%; z-index: 100; position: fixed;
      background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--main-ui);
      padding: 20px 10px; text-align: center;
    }

    #header-console h1 {
      color: var(--header-red); font-size: 24px; letter-spacing: 10px; font-weight: 900;
      text-shadow: 0 0 15px rgba(255,0,0,0.6); margin-bottom: 15px;
    }

    .nav-horizontal { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .nav-item {
      padding: 10px 18px; font-size: 11px; font-weight: 900; cursor: pointer;
      border: 2px solid var(--main-ui); background: rgba(0, 119, 255, 0.1);
      color: #fff; transition: all 0.3s; letter-spacing: 1px;
    }
    .nav-item:hover { background: var(--main-ui); box-shadow: 0 0 20px var(--glow-ui); }
    .nav-item.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 25px #fff; }

    /* PANEL */
    #panel {
      z-index: 110; position: fixed; top: 110%; left: 50%;
      transform: translateX(-50%); width: 95%; max-width: 1100px;
      height: 70vh; background: var(--panel-bg); border: 2px solid var(--main-ui);
      padding: 30px; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
      overflow-y: auto; opacity: 0; box-shadow: 0 0 50px rgba(0, 119, 255, 0.3);
    }
    #panel.active { top: 160px; opacity: 1; transform: translateX(-50%) translateY(0); }

    /* CONTENT STYLING */
    .section-title { color: var(--glow-ui); font-size: 18px; margin: 20px 0 10px; border-left: 4px solid var(--header-red); padding-left: 10px; }
    .tech-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 12px; }
    .tech-table th, .tech-table td { border: 1px solid #1a3a5a; padding: 10px; text-align: left; }
    .tech-table th { background: rgba(0, 119, 255, 0.2); color: var(--glow-ui); }
    
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
    .gallery-item { border: 1px solid #1a3a5a; padding: 10px; background: #000; }
    .gallery-item img { width: 100%; height: auto; border: 1px solid #222; }

    #center-container { z-index: 90; position: fixed; left: 50%; top: 55%; transform: translate(-50%, -50%); text-align: center; }
    .center-logo { width: 180px; opacity: 0.8; }

    #statusbar {
      z-index: 120; position: fixed; bottom: 0; width: 100%;
      background: #000; padding: 12px 25px; font-size: 10px;
      display: flex; justify-content: space-between; color: var(--main-ui); border-top: 2px solid var(--main-ui);
    }
  </style>
</head>
<body>

  <div id="bg-image"></div>
  <div id="glass-overlay"></div>

  <header id="header-console">
    <h1>VIBE WEB STUDIO</h1>
    <nav class="nav-horizontal">
      <div class="nav-item" id="btn1" onclick="openMod(1, 'BIO')">BIO</div>
      <div class="nav-item" id="btn2" onclick="openMod(2, 'GLIKPRO')">🦅 GLIKPRO</div>
      <div class="nav-item" id="btn3" onclick="openMod(3, 'RWR')">📊 SYSTEM RWR</div>
      <div class="nav-item" id="btn4" onclick="openMod(4, 'PROCES')">PROCES</div>
    </nav>
  </header>

  <div id="center-container">
    <img src="IMG_20260203_123501.png" alt="Logo" class="center-logo">
  </div>

  <div id="panel">
    <div id="p-text"></div>
    <div style="margin-top: 40px; color: #555; cursor: pointer; text-align: center; font-weight: bold;" onclick="closeMod()">[ ZAMKNIJ_SYSTEM ]</div>
  </div>

  <div id="statusbar">
    <div>CORE_OS: STABLE // AQUILAAI: ONLINE</div>
    <div id="sys-time">00:00:00</div>
  </div>

  <script>
    const content = {
      BIO: `<div class="section-title">O STUDIO</div>Nienawidzimy WordPressa tak samo jak Ty. Vibe Web Studio to pokaz siły. Zamiast instalować wtyczki, piszemy algorytmy. Zamiast kupować szablony, projektujemy doświadczenia, które ratują życie i biznes.`,
      
      GLIKPRO: `
        <div class="section-title">🦅 GLIKPRO: EKOSYSTEM PRECYZJI (Powered by AquilaAI)</div>
        <p>GlikPro to nie kolejna "apka do cukru". To natywny, pancerny ekosystem mobilny. Koniec z mulącymi rozwiązaniami webowymi. Tu rządzi .NET MAUI i silnik AquilaAI.</p>
        
        <div class="section-title">🛡️ FILOZOFIA: NATIVE OR NOTHING</div>
        <ul>
          <li><strong>Zero Lagów:</strong> Architektura C# i .NET zapewnia absolutną płynność.</li>
          <li><strong>Offline First:</strong> Dane są w telefonie. System działa w tunelu metra i na szczycie góry.</li>
          <li><strong>Zero WP:</strong> Czysty kod, pełna kontrola nad pamięcią, agresywna wydajność.</li>
        </ul>

        <div class="section-title">🧠 MÓZG: AQUILLAAI (THE BRAIN)</div>
        <table class="tech-table">
          <tr><th>Funkcja</th><th>Opis Techniczny</th><th>Szybkość</th></tr>
          <tr><td>Analiza danych</td><td>Llama 3.1 przez Groq LPU</td><td>< 1s</td></tr>
          <tr><td>Adaptacja Stylu</td><td>Tryby: Senior, Pro, Youth</td><td>Real-time</td></tr>
          <tr><td>Kontekst Medyczny</td><td>Wykrywanie trendów i hipoglikemii</td><td>Instant</td></tr>
        </table>

        <div class="gallery-grid">
          <div class="gallery-item"><img src="1000015077.jpg"><div style="font-size:10px;text-align:center;margin-top:5px;">CORE_INTERFACE</div></div>
          <div class="gallery-item"><img src="1000015076.jpg"><div style="font-size:10px;text-align:center;margin-top:5px;">DATA_VISUALIZATION</div></div>
          <div class="gallery-item"><img src="1000006255.jpg"><div style="font-size:10px;text-align:center;margin-top:5px;">PDF_CLINIC_REPORT</div></div>
        </div>
      `,

      RWR: `
        <div class="section-title">📊 SYSTEM KONTROLI I RAPORTOWANIA RWR</div>
        <p>Zaawansowana platforma analityczna dla zespołów mobilnych. Automatyzacja ewidencji, która eliminuje błędy ludzkie i oszczędza 40% czasu operacyjnego.</p>
        
        <div class="gallery-grid">
          <div class="gallery-item"><img src="rwr1.png"><div style="font-size:10px;text-align:center;margin-top:5px;">DASHBOARD_GLOWNY</div></div>
          <div class="gallery-item"><img src="rwr2.png"><div style="font-size:10px;text-align:center;margin-top:5px;">STATYSTYKI_EKIPY</div></div>
          <div class="gallery-item"><img src="rwr3.png"><div style="font-size:10px;text-align:center;margin-top:5px;">MODUL_WYJAZDOWY</div></div>
        </div>
      `,

      PROCES: `<div class="section-title">CYKL OPERACYJNY</div>01. ANALIZA_POTRZEB -> 02. ARCHITEKTURA_NATIVE -> 03. IMPLEMENTACJA_AI -> 04. TESTY_AGRESYWNE -> 05. DEPLOY_MOCY.`
    };

    function openMod(id, key) {
      document.getElementById('center-container').style.opacity = "0.05";
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('btn' + id).classList.add('active');
      document.getElementById('p-text').innerHTML = content[key];
      document.getElementById('panel').classList.add('active');
    }

    function closeMod() {
      document.getElementById('panel').classList.remove('active');
      document.getElementById('center-container').style.opacity = "1";
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    }

    setInterval(() => { document.getElementById('sys-time').innerText = new Date().toLocaleTimeString(); }, 1000);
  </script>
</body>
</html>
