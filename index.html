<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vibe Web Studio | Autorskie Strony Premium</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --main-ui: #0077ff; /* Jaśniejszy niebieski dla widoczności */
      --glow-ui: #00aaff;
      --header-red: #ff0000;
      --text-gray: #e0e0e0;
      --hero-x: 0px;
      --hero-y: 0px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
      color: #fff;
    }

    #bg-image {
      position: fixed;
      inset: 0;
      background: url('zdjtlo.png') no-repeat center center;
      background-size: cover;
      z-index: 1;
    }

    #glass-overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: rgba(0, 5, 15, 0.7); /* Ciemniejsze tło dla lepszego kontrastu */
      backdrop-filter: blur(8px);
    }

    #grid-layer {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0, 119, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 119, 255, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* NAGŁÓWEK I WIDOCZNE PRZYCISKI */
    #header-console {
      top: 0; left: 0; width: 100%;
      z-index: 100; position: fixed;
      background: rgba(0,0,0,0.95);
      border-bottom: 2px solid var(--main-ui);
      padding: 25px 10px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }

    #header-console h1 {
      color: var(--header-red);
      font-size: 22px;
      letter-spacing: 8px;
      font-weight: 900;
      margin-bottom: 15px;
      text-shadow: 0 0 10px rgba(255,0,0,0.5);
    }

    .nav-horizontal {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .nav-item {
      padding: 12px 24px;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
      border: 2px solid var(--main-ui); /* Grubsza ramka */
      background: rgba(0, 119, 255, 0.15);
      color: #fff; /* Biały tekst dla max widoczności */
      transition: all 0.3s;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 0 5px var(--main-ui);
    }

    .nav-item:hover {
      background: var(--main-ui);
      color: #000;
      box-shadow: 0 0 20px var(--glow-ui);
    }

    .nav-item.active {
      background: #fff;
      color: #000;
      border-color: #fff;
      box-shadow: 0 0 25px #fff;
    }

    /* CENTER CONTAINER */
    #center-container {
      z-index: 90; position: fixed;
      left: 50%; top: 55%;
      transform: translate(-50%, -50%);
      text-align: center;
      transition: opacity 0.5s;
    }

    .center-logo {
      width: 200px;
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
    }

    /* ROZSZERZONY PANEL */
    #panel {
      z-index: 110; position: fixed;
      top: 110%; left: 50%;
      transform: translateX(-50%);
      width: 95%;
      max-width: 1000px; /* Rozszerzone do 1000px */
      height: 65vh; /* Większa wysokość */
      background: rgba(0, 10, 25, 0.98);
      border: 2px solid var(--main-ui);
      padding: 35px;
      transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
      overflow-y: auto;
      opacity: 0;
      box-shadow: 0 0 50px rgba(0, 119, 255, 0.3);
    }

    #panel.active {
      top: 180px;
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .panel-header {
      font-size: 14px;
      color: var(--glow-ui);
      margin-bottom: 25px;
      letter-spacing: 4px;
      border-bottom: 1px solid var(--main-ui);
      padding-bottom: 10px;
    }

    /* GALERIA - SIATKA */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
    }

    .gallery-item {
      border: 1px solid var(--main-ui);
      padding: 10px;
      background: #000;
      transition: 0.3s;
    }

    .gallery-item:hover {
      border-color: #fff;
      transform: translateY(-5px);
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
    }

    .gallery-label {
      font-size: 9px;
      color: var(--glow-ui);
      margin-top: 10px;
      text-align: center;
    }

    #statusbar {
      z-index: 120; position: fixed;
      bottom: 0; width: 100%;
      background: #000;
      padding: 15px 25px;
      font-size: 10px;
      display: flex;
      justify-content: space-between;
      color: var(--main-ui);
      border-top: 2px solid var(--main-ui);
    }
  </style>
</head>
<body>

  <div id="bg-image"></div>
  <div id="glass-overlay"></div>
  <div id="grid-layer"></div>

  <header id="header-console">
    <h1>VIBE WEB STUDIO</h1>
    <nav class="nav-horizontal">
      <div class="nav-item" id="btn1" onclick="openMod(1, 'BIO')">BIO</div>
      <div class="nav-item" id="btn2" onclick="openMod(2, 'PROCES')">PROCES</div>
      <div class="nav-item" id="btn3" onclick="openMod(3, 'PROJEKTY')">PROJEKTY</div>
      <div class="nav-item" id="btn4" onclick="openMod(4, 'GALERIA')">GALERIA</div>
    </nav>
  </header>

  <div id="center-container">
    <img src="IMG_20260203_123501.png" alt="Logo" class="center-logo">
  </div>

  <div id="panel">
    <div id="p-header" class="panel-header">MODUŁ_DANYCH</div>
    <div id="p-text"></div>
    <div style="margin-top: 40px; color: #555; cursor: pointer; text-align: center; font-size: 12px; font-weight: bold;" onclick="closeMod()">[ ZAMKNIJ_MODUŁ ]</div>
  </div>

  <div id="statusbar">
    <div>SYSTEM_STATUS: ACTIVE // ENCRYPTED_CONNECTION</div>
    <div id="sys-time">00:00:00</div>
  </div>

  <script>
    const content = {
      BIO: `Projektuję i wdrażam autorskie systemy webowe. Bez szablonów. Tylko czysty kod i unikalny design.`,
      PROCES: `ANALIZA -> DESIGN -> KOD -> DEPLOY. Każdy etap pod Twoją kontrolą.`,
      PROJEKTY: `System RWR, Glyco-Tracker oraz dedykowane strony dla twórców i firm.`,
      GALERIA: `
        <div class="gallery-grid">
          <div class="gallery-item"><img src="rwr1.png"><div class="gallery-label">RWR_SYSTEM_01</div></div>
          <div class="gallery-item"><img src="rwr2.png"><div class="gallery-label">RWR_SYSTEM_02</div></div>
          <div class="gallery-item"><img src="rwr3.png"><div class="gallery-label">RWR_SYSTEM_03</div></div>
          <div class="gallery-item"><img src="1000015077.jpg"><div class="gallery-label">ANALYSIS_CORE</div></div>
          <div class="gallery-item"><img src="1000015076.jpg"><div class="gallery-label">DATA_ENGINE</div></div>
          <div class="gallery-item"><img src="1000006255.jpg"><div class="gallery-label">PDF_GENERATOR</div></div>
        </div>
      `
    };

    function openMod(id, key) {
      document.getElementById('center-container').style.opacity = "0.1";
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('btn' + id).classList.add('active');
      document.getElementById('p-header').innerText = `MODUŁ_${key}`;
      document.getElementById('p-text').innerHTML = content[key === 'GALERIA' ? 'GALERIA' : key === 'PROJEKTY' ? 'PROJEKTY' : key];
      document.getElementById('panel').classList.add('active');
    }

    function closeMod() {
      document.getElementById('panel').classList.remove('active');
      document.getElementById('center-container').style.opacity = "1";
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    }

    setInterval(() => {
      document.getElementById('sys-time').innerText = new Date().toLocaleTimeString();
    }, 1000);
  </script>
</body>
</html>
